[project]
name = "fishystuff"
revision = "1.0"

[profiles.api]
FISHYSTUFF_DATABASE_URL = { description = "Database URL for the API and DB-backed tooling", required = false, default = "mysql://root@localhost:3306/fishystuff" }

[profiles.cdn]
BUNNY_STORAGE_ENDPOINT = { description = "Bunny Storage HTTP endpoint host", required = false, default = "storage.bunnycdn.com" }
BUNNY_STORAGE_ZONE = { description = "Bunny Storage zone name", required = false, default = "fishystuff" }
BUNNY_STORAGE_ACCESS_KEY = { description = "Bunny Storage HTTP access key", required = false }
BUNNY_FTP_HOST = { description = "Bunny Storage FTP host", required = false, default = "storage.bunnycdn.com" }
BUNNY_FTP_PORT = { description = "Bunny Storage FTP port", required = false, default = "21" }
BUNNY_FTP_USER = { description = "Bunny Storage FTP username", required = false, default = "fishystuff" }
BUNNY_FTP_PASSWORD = { description = "Bunny Storage FTP password", required = true }

[profiles.beta-deploy]
HETZNER_API_TOKEN = { description = "Hetzner Cloud API token for beta VPS provisioning and deployment", required = true }
HETZNER_SSH_KEY_NAME = { description = "Hetzner Cloud project SSH key name used for beta VPS bootstrap", required = false, default = "fishystuff-beta-deploy" }
HETZNER_SSH_PUBLIC_KEY = { description = "SSH public key material uploaded to Hetzner Cloud for beta VPS bootstrap", required = true }
HETZNER_SSH_PRIVATE_KEY = { description = "SSH private key material used for resident mgmt bootstrap and deploy access to beta hosts", required = true }
CLOUDFLARE_API_TOKEN = { description = "Cloudflare API token with DNS and Zone scope for managing beta DNS records", required = false }
FISHYSTUFF_BETA_DEPLOYMENT_ENVIRONMENT = { description = "Deployment environment name used for beta resident manifests", required = false, default = "beta" }
FISHYSTUFF_BETA_RESIDENT_HOSTNAME = { description = "Resident mgmt hostname for beta deploys", required = false, default = "site-nbg1-beta" }
FISHYSTUFF_BETA_RESIDENT_TARGET = { description = "SSH target used for beta resident deploys", required = false, default = "root@beta.fishystuff.fish" }
FISHYSTUFF_BETA_TELEMETRY_HOSTNAME = { description = "Telemetry hostname for beta deploys", required = false, default = "telemetry-nbg1" }
FISHYSTUFF_BETA_TELEMETRY_TARGET = { description = "SSH target used for beta telemetry deploys", required = false, default = "root@telemetry.beta.fishystuff.fish" }
FISHYSTUFF_BETA_PROD_HOSTNAME = { description = "Deferred prod hostname carried in beta manifests", required = false, default = "site-nbg1-prod" }
FISHYSTUFF_BETA_CONTROL_TARGET = { description = "SSH target used for beta control-plane deploys", required = false, default = "mgmt-root" }
FISHYSTUFF_BETA_TUNNEL_TARGET = { description = "SSH target used for beta service tunnels", required = false, default = "root@beta.fishystuff.fish" }
FISHYSTUFF_BETA_SITE_BASE_URL = { description = "Public site base URL for beta", required = false, default = "https://beta.fishystuff.fish/" }
FISHYSTUFF_BETA_API_BASE_URL = { description = "Public API base URL for beta", required = false, default = "https://api.beta.fishystuff.fish/" }
FISHYSTUFF_BETA_CDN_BASE_URL = { description = "Public CDN base URL for beta", required = false, default = "https://cdn.beta.fishystuff.fish/" }
FISHYSTUFF_BETA_TELEMETRY_BASE_URL = { description = "Public telemetry base URL for beta", required = false, default = "https://telemetry.beta.fishystuff.fish/" }
FISHYSTUFF_BETA_TLS_ENABLED = { description = "Whether beta resident deploys enable ACME TLS", required = false, default = "true" }
FISHYSTUFF_BETA_TLS_ACME_EMAIL = { description = "ACME account email for beta resident deploys", required = false, default = "acme@karpfen.dev" }
FISHYSTUFF_BETA_TLS_CHALLENGE = { description = "ACME challenge type for beta resident deploys", required = false, default = "dns-01" }
FISHYSTUFF_BETA_TLS_DNS_PROVIDER = { description = "DNS provider used for beta ACME DNS-01 challenges", required = false, default = "cloudflare" }
FISHYSTUFF_BETA_TLS_DNS_ZONE = { description = "DNS zone used for beta ACME DNS-01 challenges", required = false, default = "fishystuff.fish" }
FISHYSTUFF_BETA_TLS_DIRECTORY_URL = { description = "ACME directory URL for beta resident deploys", required = false, default = "https://acme-v02.api.letsencrypt.org/directory" }
FISHYSTUFF_BETA_OPEN_TUNNEL_TTL_SECONDS = { description = "Lifetime in seconds for beta operator SSH tunnels opened by just open", required = false, default = "900" }
FISHYSTUFF_PRODUCTION_DEPLOYMENT_ENVIRONMENT = { description = "Deployment environment name used for production resident manifests", required = false, default = "production" }
FISHYSTUFF_PRODUCTION_RESIDENT_HOSTNAME = { description = "Resident mgmt hostname for production deploys", required = false }
FISHYSTUFF_PRODUCTION_RESIDENT_TARGET = { description = "SSH target used for production resident deploys", required = false }
FISHYSTUFF_PRODUCTION_TELEMETRY_HOSTNAME = { description = "Telemetry hostname for production deploys", required = false }
FISHYSTUFF_PRODUCTION_TELEMETRY_TARGET = { description = "SSH target used for production telemetry deploys", required = false }
FISHYSTUFF_PRODUCTION_PROD_HOSTNAME = { description = "Production hostname carried in resident manifests", required = false, default = "site-nbg1-prod" }
FISHYSTUFF_PRODUCTION_CONTROL_TARGET = { description = "SSH target used for production control-plane deploys", required = false }
FISHYSTUFF_PRODUCTION_TUNNEL_TARGET = { description = "SSH target used for production service tunnels", required = false }
FISHYSTUFF_PRODUCTION_SITE_BASE_URL = { description = "Public site base URL for production", required = false, default = "https://fishystuff.fish/" }
FISHYSTUFF_PRODUCTION_API_BASE_URL = { description = "Public API base URL for production", required = false, default = "https://api.fishystuff.fish/" }
FISHYSTUFF_PRODUCTION_CDN_BASE_URL = { description = "Public CDN base URL for production", required = false, default = "https://cdn.fishystuff.fish/" }
FISHYSTUFF_PRODUCTION_TELEMETRY_BASE_URL = { description = "Public telemetry base URL for production", required = false, default = "https://telemetry.fishystuff.fish/" }
FISHYSTUFF_PRODUCTION_DOLT_REMOTE_BRANCH = { description = "Dolt branch used by production API defaults", required = false, default = "main" }
FISHYSTUFF_PRODUCTION_TLS_ENABLED = { description = "Whether production resident deploys enable ACME TLS", required = false, default = "true" }
FISHYSTUFF_PRODUCTION_TLS_ACME_EMAIL = { description = "ACME account email for production resident deploys", required = false, default = "acme@karpfen.dev" }
FISHYSTUFF_PRODUCTION_TLS_CHALLENGE = { description = "ACME challenge type for production resident deploys", required = false, default = "http-01" }
FISHYSTUFF_PRODUCTION_TLS_DNS_PROVIDER = { description = "DNS provider used for production ACME DNS-01 challenges", required = false, default = "" }
FISHYSTUFF_PRODUCTION_TLS_DNS_ZONE = { description = "DNS zone used for production ACME DNS-01 challenges", required = false, default = "" }
FISHYSTUFF_PRODUCTION_TLS_DIRECTORY_URL = { description = "ACME directory URL for production resident deploys", required = false, default = "https://acme-v02.api.letsencrypt.org/directory" }
FISHYSTUFF_PRODUCTION_OPEN_TUNNEL_TTL_SECONDS = { description = "Lifetime in seconds for production operator SSH tunnels opened by just open", required = false, default = "900" }
FISHYSTUFF_ORIGIN_SMOKE_IPV4 = { description = "Origin IPv4 used by production deploy smoke before DNS cutover", required = false }

[profiles.bot]
DISCORD_TOKEN = { description = "Discord bot token", required = true }
MOD_INFO_CHANNEL_ID = { description = "Optional moderation info channel id override", required = false, default = "211092999835222017" }
TRAP_CHANNEL_ID = { description = "Optional trap moderation channel id", required = false }
TRAP_PURGE_WINDOW_S = { description = "Trap purge window in seconds", required = false, default = "60" }
TRAP_FALLBACK_TIMEOUTM = { description = "Trap fallback timeout in minutes", required = false, default = "9999" }
