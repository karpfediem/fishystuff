[project]
name = "fishystuff"
revision = "1.0"

[profiles.api]
FISHYSTUFF_DATABASE_URL = { description = "Database URL for the API and DB-backed tooling", required = false, default = "mysql://root@localhost:3306/fishystuff" }

[profiles.cdn]
BUNNY_STORAGE_ENDPOINT = { description = "Bunny Storage HTTP endpoint host", required = false, default = "storage.bunnycdn.com" }
BUNNY_STORAGE_ZONE = { description = "Bunny Storage zone name", required = false, default = "fishystuff" }
BUNNY_STORAGE_ACCESS_KEY = { description = "Bunny Storage HTTP access key", required = false }
BUNNY_FTP_HOST = { description = "Bunny Storage FTP host", required = false, default = "storage.bunnycdn.com" }
BUNNY_FTP_PORT = { description = "Bunny Storage FTP port", required = false, default = "21" }
BUNNY_FTP_USER = { description = "Bunny Storage FTP username", required = false, default = "fishystuff" }
BUNNY_FTP_PASSWORD = { description = "Bunny Storage FTP password", required = true }

[profiles.beta-deploy]
HETZNER_API_TOKEN = { description = "Hetzner Cloud API token for beta VPS provisioning and deployment", required = true }
HETZNER_SSH_KEY_NAME = { description = "Hetzner Cloud project SSH key name used for beta VPS bootstrap", required = false, default = "fishystuff-beta-deploy" }
HETZNER_SSH_PUBLIC_KEY = { description = "SSH public key material uploaded to Hetzner Cloud for beta VPS bootstrap", required = true }
HETZNER_SSH_PRIVATE_KEY = { description = "SSH private key material used for resident mgmt bootstrap and deploy access to beta hosts", required = true }

[profiles.bot]
DISCORD_TOKEN = { description = "Discord bot token", required = true }
MOD_INFO_CHANNEL_ID = { description = "Optional moderation info channel id override", required = false, default = "211092999835222017" }
TRAP_CHANNEL_ID = { description = "Optional trap moderation channel id", required = false }
TRAP_PURGE_WINDOW_S = { description = "Trap purge window in seconds", required = false, default = "60" }
TRAP_FALLBACK_TIMEOUTM = { description = "Trap fallback timeout in minutes", required = false, default = "9999" }
