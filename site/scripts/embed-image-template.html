<!DOCTYPE html>
<html data-theme="fishy" lang="__LOCALE__">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=900, initial-scale=1">
  <link rel="stylesheet" href="__FONTS_CSS_HREF__">
  <link rel="stylesheet" href="__SITE_CSS_HREF__">
  <style>
    html, body {
      margin: 0;
      width: 900px;
      height: 300px;
      overflow: hidden;
    }

    body {
      background: var(--color-base-100);
      color: var(--color-base-content);
    }

    .embed-stage {
      box-sizing: border-box;
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
      padding: 0.9rem 1.5rem 0.4rem;
    }

    .embed-stage > .max-w-3xl {
      width: min(100%, 860px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      transform: translateY(-0.6rem);
    }

    .home-wordmark {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      min-width: max-content;
      margin-bottom: 0.65rem;
      white-space: nowrap;
      font-size: 3.7rem;
      line-height: 0.92;
      text-decoration: none;
    }

    .home-wordmark img {
      height: 4.8rem;
      width: auto;
      flex: none;
    }

    .embed-title {
      margin: 0;
      max-width: 860px;
      font-size: __TITLE_FONT_SIZE__;
      font-weight: 900;
      line-height: 1.02;
      text-wrap: balance;
    }
  </style>
</head>
<body>
  <div class="embed-stage">
    <div class="max-w-3xl">
      <a href="__HOME_HREF__" class="home-wordmark font-brand font-bold no-underline hover:no-underline focus:no-underline">
        <span>Fishy Stuff</span>
        <img src="__LOGO_HREF__" alt="" decoding="async">
      </a>
      <h1 class="embed-title">__TAGLINE__</h1>
    </div>
  </div>
  <script>
    Promise.all([
      document.fonts ? document.fonts.ready : Promise.resolve(),
      new Promise((resolve) => requestAnimationFrame(() => requestAnimationFrame(resolve))),
    ]).then(() => {
      document.documentElement.setAttribute("data-ready", "true");
    });
  </script>
</body>
</html>
