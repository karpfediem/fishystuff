<div id="map-page-shell"
         data-on-signal-patch-filter="{include: /^_(?:map_[^.]+|shared_fish)(?:\.|$)/}"
         data-on-signal-patch="el.dispatchEvent(new CustomEvent('fishymap:signal-patched', { bubbles: true, detail: patch }))"
         data-signals="{
           _map_ui: {
             windowUi: {
               search: { open: true, collapsed: false, x: null, y: null },
               settings: { open: false, collapsed: false, x: null, y: null, autoAdjustView: true, normalizeRates: true },
               zoneInfo: { open: true, collapsed: false, x: null, y: null, tab: '' },
               layers: { open: true, collapsed: false, x: null, y: null },
               bookmarks: { open: false, collapsed: false, x: null, y: null }
             },
             search: {
               open: false,
               query: '',
               expression: { type: 'group', operator: 'or', children: [] },
               selectedTerms: []
             },
             bookmarks: { placing: false, selectedIds: [] },
             layers: { expandedLayerIds: [], hoverFactsVisibleByLayer: {}, sampleHoverVisibleByLayer: {} }
           },
           _map_bridged: {
             filters: {
               fishIds: [],
               zoneRgbs: [],
               semanticFieldIdsByLayer: {},
               fishFilterTerms: [],
               searchExpression: { type: 'group', operator: 'or', children: [] },
               patchId: null,
               fromPatchId: null,
               toPatchId: null,
               layerIdsVisible: ['bookmarks', 'fish_evidence', 'zone_mask', 'minimap'],
               layerIdsOrdered: [],
               layerFilterBindingIdsDisabledByLayer: {},
               layerOpacities: {},
               layerClipMasks: { fish_evidence: 'zone_mask' },
               layerWaypointConnectionsVisible: {},
               layerWaypointLabelsVisible: {},
               layerPointIconsVisible: {},
               layerPointIconScales: {}
             },
             ui: {
               diagnosticsOpen: false,
               showPoints: true,
               showPointIcons: true,
               viewMode: null,
               pointIconScale: 2,
               bookmarkSelectedIds: [],
               bookmarks: []
             }
           },
           _map_actions: {
             resetViewToken: 0,
             resetUiToken: 0,
             saveMapPresetToken: 0,
             discardMapPresetToken: 0,
             focusWorldPointToken: 0,
             focusWorldPoint: null
           },
           _map_bookmarks: {
             entries: []
           },
           _map_session: {
             view: { viewMode: '2d', camera: {} },
             selection: {}
           },
           _map_runtime: {
             ready: false,
             theme: {},
             effectiveFilters: {
               searchExpression: { type: 'group', operator: 'or', children: [] },
               sharedFishState: { caughtIds: [], favouriteIds: [] },
               zoneMembershipByLayer: {},
               semanticFieldFiltersByLayer: {}
             },
             view: { viewMode: '2d', camera: {} },
             selection: {},
             catalog: { layers: [], patches: [], fish: [], semanticTerms: [] },
             statuses: {},
             lastDiagnostic: null
           },
           _shared_fish: {
             caughtIds: [],
             favouriteIds: []
           },
           _user_presets: {
             version: 0,
             collections: {
               'map-presets': {
                 canSave: false,
                 canDiscard: false
               }
             }
           }
         }">
      <div hidden
           data-init="const shell = el.closest('#map-page-shell'); shell.__fishymapInitialSignals = $; shell.dispatchEvent(new CustomEvent('fishymap-live-init', { bubbles: true, detail: $ }))"></div>
      <canvas id="bevy"></canvas>
      <div id="fishymap-toolbar" class="not-prose" aria-label="" data-i18n-attr-aria-label="map.toolbar.map_windows">
        <button
          class="fishymap-toolbar-button"
          data-window-toggle="search"
          data-on:click="$_map_ui.windowUi.search.open = !$_map_ui.windowUi.search.open"
          type="button"
          data-attr:data-open="$_map_ui.windowUi.search.open ? 'true' : 'false'"
          data-attr:aria-pressed="$_map_ui.windowUi.search.open"
          aria-label=""
          title=""
          data-i18n-attr-aria-label="map.toolbar.search"
          data-i18n-attr-title="map.toolbar.search"
        >
          <svg class="fishy-icon size-5" viewBox="0 0 24 24" aria-hidden="true"><use width="100%" height="100%" href="#fishy-magnifying-glass"></use></svg>
        </button>
        <button
          class="fishymap-toolbar-button"
          data-window-toggle="bookmarks"
          data-on:click="$_map_ui.windowUi.bookmarks.open = !$_map_ui.windowUi.bookmarks.open"
          type="button"
          data-attr:data-open="$_map_ui.windowUi.bookmarks.open ? 'true' : 'false'"
          data-attr:aria-pressed="$_map_ui.windowUi.bookmarks.open"
          aria-label=""
          title=""
          data-i18n-attr-aria-label="map.toolbar.bookmarks"
          data-i18n-attr-title="map.toolbar.bookmarks"
        >
          <svg class="fishy-icon size-5" viewBox="0 0 24 24" aria-hidden="true"><use width="100%" height="100%" href="#fishy-bookmarks"></use></svg>
        </button>
        <button
          class="fishymap-toolbar-button"
          data-window-toggle="settings"
          data-on:click="$_map_ui.windowUi.settings.open = !$_map_ui.windowUi.settings.open"
          type="button"
          data-attr:data-open="$_map_ui.windowUi.settings.open ? 'true' : 'false'"
          data-attr:aria-pressed="$_map_ui.windowUi.settings.open"
          aria-label=""
          title=""
          data-i18n-attr-aria-label="map.toolbar.settings"
          data-i18n-attr-title="map.toolbar.settings"
        >
          <svg class="fishy-icon size-5" viewBox="0 0 24 24" aria-hidden="true"><use width="100%" height="100%" href="#fishy-adjustments-horizontal"></use></svg>
        </button>
        <button
          class="fishymap-toolbar-button"
          data-window-toggle="zone-info"
          data-on:click="$_map_ui.windowUi.zoneInfo.open = !$_map_ui.windowUi.zoneInfo.open"
          type="button"
          data-attr:data-open="$_map_ui.windowUi.zoneInfo.open ? 'true' : 'false'"
          data-attr:aria-pressed="$_map_ui.windowUi.zoneInfo.open"
          aria-label=""
          title=""
          data-i18n-attr-aria-label="map.toolbar.info"
          data-i18n-attr-title="map.toolbar.info"
        >
          <svg class="fishy-icon size-5" viewBox="0 0 24 24" aria-hidden="true"><use width="100%" height="100%" href="#fishy-inspect-fill"></use></svg>
        </button>
        <button
          class="fishymap-toolbar-button"
          data-window-toggle="layers"
          data-on:click="$_map_ui.windowUi.layers.open = !$_map_ui.windowUi.layers.open"
          type="button"
          data-attr:data-open="$_map_ui.windowUi.layers.open ? 'true' : 'false'"
          data-attr:aria-pressed="$_map_ui.windowUi.layers.open"
          aria-label=""
          title=""
          data-i18n-attr-aria-label="map.toolbar.layers"
          data-i18n-attr-title="map.toolbar.layers"
        >
          <svg class="fishy-icon size-5" viewBox="0 0 24 24" aria-hidden="true"><use width="100%" height="100%" href="#fishy-squares-2x2"></use></svg>
        </button>
      </div>
      <aside
        id="fishymap-search-window"
        class="fishymap-window not-prose"
        data-window-id="search"
        data-show="$_map_ui.windowUi.search.open"
        data-attr:data-collapsed="$_map_ui.windowUi.search.collapsed ? 'true' : 'false'"
        style="display: none"
      >
        <div
          class="fishymap-window-header"
          id="fishymap-search-titlebar"
          data-window-titlebar="search"
          data-attr:aria-expanded="!$_map_ui.windowUi.search.collapsed"
        >
          <div class="fishymap-window-header-content">
            <svg class="fishy-icon fishymap-window-title-icon size-5" viewBox="0 0 24 24" aria-hidden="true"><use width="100%" height="100%" href="#fishy-magnifying-glass"></use></svg>
            <span id="fishymap-search-title-text" class="fishymap-window-title text-lg leading-tight" data-i18n-text="map.search.window_title"></span>
          </div>
          <label class="fishymap-search-title-input input input-bordered input-sm rounded-full" data-window-drag-ignore="true">
            <input
              id="fishymap-search"
              class="grow"
              type="search"
              placeholder=""
              data-i18n-attr-placeholder="map.search.placeholder"
              autocomplete="off"
              data-bind="_map_ui.search.query"
              data-on:input="$_map_ui.search.open = true"
              data-on:focus="$_map_ui.search.open = true"
            >
            <span id="fishymap-search-count" class="badge badge-soft badge-primary badge-sm" hidden></span>
          </label>
        </div>
        <div
          id="fishymap-search-body"
          class="fishymap-window-body"
          data-show="!$_map_ui.windowUi.search.collapsed"
          style="display: none"
        >
          <fishymap-search-panel
            id="fishymap-search-panel"
            class="not-prose"
            data-attr:data-search-state="JSON.stringify($_map_ui.search)"
          ></fishymap-search-panel>
        </div>
      </aside>
      <aside
        id="fishymap-bookmarks-window"
        class="fishymap-window card card-border bg-base-100 not-prose"
        data-window-id="bookmarks"
        data-show="$_map_ui.windowUi.bookmarks.open"
        data-attr:data-collapsed="$_map_ui.windowUi.bookmarks.collapsed ? 'true' : 'false'"
        style="display: none"
      >
        <div
          class="fishymap-window-header"
          id="fishymap-bookmarks-titlebar"
          data-window-titlebar="bookmarks"
          role="button"
          tabindex="0"
          data-attr:aria-expanded="!$_map_ui.windowUi.bookmarks.collapsed"
        >
          <div class="fishymap-window-header-content">
            <svg class="fishy-icon fishymap-window-title-icon size-5" viewBox="0 0 24 24" aria-hidden="true"><use width="100%" height="100%" href="#fishy-bookmarks"></use></svg>
            <span class="fishymap-window-title text-lg leading-tight" data-i18n-text="map.bookmarks.window_title"></span>
          </div>
          <button id="fishymap-bookmark-place" class="btn btn-primary btn-sm" type="button">
            <svg class="fishy-icon size-4" viewBox="0 0 24 24" aria-hidden="true"><use width="100%" height="100%" href="#fishy-bookmark-add"></use></svg>
            <span id="fishymap-bookmark-place-label" data-i18n-text="map.bookmarks.new"></span>
          </button>
        </div>
        <div
          id="fishymap-bookmarks-body"
          class="fishymap-window-body"
          data-show="!$_map_ui.windowUi.bookmarks.collapsed"
          style="display: none"
        >
          <fishymap-bookmark-panel id="fishymap-bookmark-panel" class="not-prose"></fishymap-bookmark-panel>
        </div>
      </aside>
      <aside
        id="fishymap-zone-info-window"
        class="fishymap-window card card-border bg-base-100 not-prose"
        data-window-id="zoneInfo"
        data-show="$_map_ui.windowUi.zoneInfo.open"
        data-attr:data-collapsed="$_map_ui.windowUi.zoneInfo.collapsed ? 'true' : 'false'"
        style="display: none"
      >
        <div
          class="fishymap-window-header"
          id="fishymap-zone-info-titlebar"
          data-window-titlebar="zoneInfo"
          role="button"
          tabindex="0"
          data-attr:aria-expanded="!$_map_ui.windowUi.zoneInfo.collapsed"
        >
          <div class="fishymap-window-header-content">
            <span id="fishymap-zone-info-title-icon" class="fishy-icon fishymap-window-title-icon size-5" aria-hidden="true">
              <svg class="size-5" viewBox="0 0 24 24" aria-hidden="true"><use width="100%" height="100%" href="#fishy-inspect-fill"></use></svg>
            </span>
            <button
              id="fishymap-zone-info-history-back"
              class="fishymap-selection-history-nav btn btn-ghost btn-xs"
              type="button"
              data-window-drag-ignore="true"
              hidden
              disabled
            >
              <svg class="fishy-icon size-4" viewBox="0 0 24 24" aria-hidden="true"><use width="100%" height="100%" href="#fishy-left-fill"></use></svg>
            </button>
            <span id="fishymap-zone-info-title" class="fishymap-window-title truncate text-lg leading-tight" data-i18n-text="map.info.window_title"></span>
            <button
              id="fishymap-zone-info-history-forward"
              class="fishymap-selection-history-nav btn btn-ghost btn-xs"
              type="button"
              data-window-drag-ignore="true"
              hidden
              disabled
            >
              <svg class="fishy-icon size-4" viewBox="0 0 24 24" aria-hidden="true"><use width="100%" height="100%" href="#fishy-right-fill"></use></svg>
            </button>
          </div>
          <span id="fishymap-zone-info-status" class="inline-flex min-w-0 items-center gap-2 text-xs text-base-content/60">
            <span id="fishymap-zone-info-status-icon" class="inline-flex text-base-content/55" aria-hidden="true">
              <svg class="size-4" viewBox="0 0 24 24" aria-hidden="true"><use width="100%" height="100%" href="#fishy-information-circle"></use></svg>
            </span>
            <span id="fishymap-zone-info-status-text" class="truncate" data-i18n-text="map.info.status.no_selection"></span>
          </span>
        </div>
        <div
          id="fishymap-zone-info-body"
          class="fishymap-window-body"
          data-show="!$_map_ui.windowUi.zoneInfo.collapsed"
          style="display: none"
        >
          <fishymap-info-panel
            id="fishymap-info-panel"
            class="space-y-3 not-prose"
            data-normalize-rates="true"
            data-attr:data-normalize-rates="$_map_ui.windowUi.settings.normalizeRates ? 'true' : 'false'"
          ></fishymap-info-panel>
        </div>
      </aside>
      <aside
        id="fishymap-layers-window"
        class="fishymap-window card card-border bg-base-100 not-prose"
        data-window-id="layers"
        data-show="$_map_ui.windowUi.layers.open"
        data-attr:data-collapsed="$_map_ui.windowUi.layers.collapsed ? 'true' : 'false'"
        style="display: none"
      >
        <div
          class="fishymap-window-header"
          id="fishymap-layers-titlebar"
          data-window-titlebar="layers"
          role="button"
          tabindex="0"
          data-attr:aria-expanded="!$_map_ui.windowUi.layers.collapsed"
        >
          <div class="fishymap-window-header-content">
            <svg class="fishy-icon fishymap-window-title-icon size-5" viewBox="0 0 24 24" aria-hidden="true"><use width="100%" height="100%" href="#fishy-squares-2x2"></use></svg>
            <p class="fishymap-window-title text-lg leading-tight" data-i18n-text="map.layers.window_title"></p>
          </div>
          <span id="fishymap-layers-count" class="badge badge-outline badge-sm">0</span>
        </div>
        <div
          id="fishymap-layers-body"
          class="fishymap-window-body"
          data-show="!$_map_ui.windowUi.layers.collapsed"
          style="display: none"
        >
          <fishymap-layer-panel id="fishymap-layer-panel" class="not-prose"></fishymap-layer-panel>
        </div>
      </aside>
      <aside
        id="fishymap-panel"
        class="fishymap-window card card-border bg-base-100 not-prose"
        data-window-id="settings"
        data-show="$_map_ui.windowUi.settings.open"
        data-attr:data-collapsed="$_map_ui.windowUi.settings.collapsed ? 'true' : 'false'"
        style="display: none"
      >
        <div
          class="fishymap-window-header"
          id="fishymap-panel-titlebar"
          data-window-titlebar="settings"
          role="button"
          tabindex="0"
          data-attr:aria-expanded="!$_map_ui.windowUi.settings.collapsed"
        >
          <div class="fishymap-window-header-content">
            <svg class="fishy-icon fishymap-window-title-icon size-5" viewBox="0 0 24 24" aria-hidden="true"><use width="100%" height="100%" href="#fishy-adjustments-horizontal"></use></svg>
            <p class="fishymap-window-title text-lg leading-tight" data-i18n-text="map.settings.window_title"></p>
          </div>
          <span
            id="fishymap-ready-pill"
            class="badge badge-sm gap-2 text-base-content/80"
            data-class:badge-success="$_map_runtime.ready"
            data-class:badge-outline="!$_map_runtime.ready"
          >
            <span class="loading loading-spinner loading-xs" aria-hidden="true" data-show="!$_map_runtime.ready" style="display: none"></span>
            <span data-show="$_map_runtime.ready" style="display: none" data-i18n-text="map.settings.ready"></span>
            <span data-show="!$_map_runtime.ready" data-i18n-text="map.settings.loading"></span>
          </span>
        </div>

        <div
          id="fishymap-panel-body"
          class="fishymap-window-body flex flex-col gap-4 px-4 py-4"
          data-show="!$_map_ui.windowUi.settings.collapsed"
          style="display: none"
        >
          <div class="space-y-3">
            <div class="flex flex-col gap-2">
              <button
                id="fishymap-reset-view"
                class="btn btn-outline btn-secondary btn-sm w-full"
                type="button"
                data-on:click="$_map_actions.resetViewToken = ($_map_actions.resetViewToken || 0) + 1"
                data-i18n-text="map.settings.reset_view"
              ></button>
              <button
                id="fishymap-reset-ui"
                class="btn btn-outline btn-sm w-full"
                type="button"
                data-on:click="$_map_actions.resetUiToken = ($_map_actions.resetUiToken || 0) + 1"
                data-i18n-text="map.settings.reset_ui"
              ></button>
              <fishy-preset-manager
                class="w-full"
                data-preset-collection="map-presets"
              ></fishy-preset-manager>
              <div
                class="grid grid-cols-2 gap-2"
                data-show="$_user_presets.collections['map-presets'].canSave || $_user_presets.collections['map-presets'].canDiscard"
                style="display: none"
              >
                <button
                  id="fishymap-save-preset"
                  class="btn btn-primary btn-sm"
                  type="button"
                  data-show="$_user_presets.collections['map-presets'].canSave"
                  data-on:click="$_map_actions.saveMapPresetToken = ($_map_actions.saveMapPresetToken || 0) + 1"
                ><svg class="fishy-icon fishy-icon--inline size-4" viewBox="0 0 24 24" aria-hidden="true"><use width="100%" height="100%" href="#fishy-check-badge-solid"></use></svg><span data-i18n-text="presets.button.save"></span></button>
                <button
                  id="fishymap-discard-preset"
                  class="btn btn-warning btn-outline btn-sm"
                  type="button"
                  data-show="$_user_presets.collections['map-presets'].canDiscard"
                  data-on:click="$_map_actions.discardMapPresetToken = ($_map_actions.discardMapPresetToken || 0) + 1"
                ><svg class="fishy-icon fishy-icon--inline size-4" viewBox="0 0 24 24" aria-hidden="true"><use width="100%" height="100%" href="#fishy-clear"></use></svg><span data-i18n-text="presets.button.discard"></span></button>
              </div>
            </div>

            <fieldset class="fieldset rounded-box border border-base-300/70 bg-base-200 p-4">
              <legend class="fieldset-legend px-1 text-sm font-semibold" data-i18n-text="map.settings.display"></legend>
              <div class="space-y-3 pt-1">
                <label class="flex items-center justify-between gap-3 text-sm">
                  <span class="font-semibold" data-i18n-text="map.settings.auto_adjust_view"></span>
                  <input id="fishymap-auto-adjust-view" class="checkbox checkbox-sm checkbox-primary" type="checkbox" checked data-bind="_map_ui.windowUi.settings.autoAdjustView">
                </label>
                <label class="flex items-center justify-between gap-3 text-sm">
                  <span class="font-semibold" data-i18n-text="map.settings.normalize_rates"></span>
                  <input id="fishymap-normalize-rates" class="toggle toggle-sm toggle-primary" type="checkbox" checked data-bind="_map_ui.windowUi.settings.normalizeRates">
                </label>
              </div>
            </fieldset>
          </div>

          <details
            id="fishymap-diagnostics"
            class="collapse collapse-arrow border border-base-300/70 bg-base-200"
            data-attr:open="$_map_bridged.ui.diagnosticsOpen"
            data-on:toggle="$_map_bridged.ui.diagnosticsOpen = evt.currentTarget.open"
          >
            <summary class="collapse-title min-h-0 py-3 text-sm font-semibold" data-i18n-text="map.settings.diagnostics"></summary>
            <div class="collapse-content space-y-3">
              <div id="fishymap-status-lines" class="space-y-1 text-xs text-base-content/70"></div>
              <pre id="fishymap-diagnostic-json" class="rounded-box border border-neutral/20 bg-neutral text-neutral-content p-3 text-[11px] leading-5" data-i18n-text="map.settings.waiting_bridge_events"></pre>
            </div>
          </details>
        </div>
      </aside>

      <fishymap-hover-tooltip id="fishymap-hover-tooltip" class="card card-border bg-base-100 not-prose" hidden></fishymap-hover-tooltip>
      <fishymap-window-manager id="fishymap-window-manager" hidden></fishymap-window-manager>

      <div id="fishymap-error-overlay" class="card card-border border-error/40 bg-base-100 not-prose" hidden>
        <div class="space-y-3 px-4 py-4">
          <div class="flex items-center justify-between gap-3">
            <p class="fishymap-window-title text-lg leading-tight text-error" data-i18n-text="map.error.renderer_unavailable"></p>
            <span class="badge badge-error badge-sm" data-i18n-text="map.error.badge"></span>
          </div>
          <p class="text-sm text-base-content/80" data-i18n-text="map.error.renderer_start_failed"></p>
          <pre id="fishymap-error-message" class="rounded-box bg-neutral text-neutral-content p-3 text-[11px] leading-5"></pre>
        </div>
      </div>
    </div>
