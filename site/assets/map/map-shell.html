<div id="map-page-shell"
         data-on-signal-patch-filter="{include: /^_(?:map_|shared_fish)(?:\.|$)/}"
         data-on-signal-patch="el.dispatchEvent(new CustomEvent('fishymap:signal-patched', { bubbles: true, detail: patch }))"
         data-signals="{
           _map_ui: {
             windowUi: {
               search: { open: true, collapsed: false, x: null, y: null },
               settings: { open: true, collapsed: false, x: null, y: null, autoAdjustView: true },
               zoneInfo: { open: true, collapsed: false, x: null, y: null, tab: '' },
               layers: { open: true, collapsed: false, x: null, y: null },
               bookmarks: { open: false, collapsed: false, x: null, y: null }
             },
             search: { open: false, query: '', selectedTerms: [] },
             bookmarks: { placing: false, selectedIds: [] },
             layers: { expandedLayerIds: [], hoverFactsVisibleByLayer: {} }
           },
           _map_bridged: {
             filters: {
               fishIds: [],
               zoneRgbs: [],
               semanticFieldIdsByLayer: {},
               fishFilterTerms: [],
               patchId: null,
               fromPatchId: null,
               toPatchId: null,
               layerIdsVisible: ['bookmarks', 'fish_evidence', 'zone_mask', 'minimap'],
               layerIdsOrdered: [],
               zoneMembershipLayerIds: [],
               layerOpacities: {},
               layerClipMasks: { fish_evidence: 'zone_mask' },
               layerWaypointConnectionsVisible: {},
               layerWaypointLabelsVisible: {},
               layerPointIconsVisible: {},
               layerPointIconScales: {}
             },
             ui: {
               diagnosticsOpen: false,
               showPoints: true,
               showPointIcons: true,
               viewMode: null,
               pointIconScale: 1,
               bookmarkSelectedIds: [],
               bookmarks: []
             }
           },
           _map_actions: {
             resetViewToken: 0,
             resetUiToken: 0,
             focusWorldPointToken: 0,
             focusWorldPoint: null
           },
           _map_bookmarks: {
             entries: []
           },
           _map_session: {
             view: { viewMode: '2d', camera: {} },
             selection: {}
           },
           _map_runtime: {
             ready: false,
             theme: {},
             view: { viewMode: '2d', camera: {} },
             selection: {},
             catalog: { layers: [], patches: [], fish: [], semanticTerms: [] },
             statuses: {},
             lastDiagnostic: null
           },
           _shared_fish: {
             caughtIds: [],
             favouriteIds: []
           }
         }">
      <div hidden
           data-init="const shell = el.closest('#map-page-shell'); shell.__fishymapInitialSignals = $; shell.dispatchEvent(new CustomEvent('fishymap-live-init', { bubbles: true, detail: $ }))"></div>
      <canvas id="bevy"></canvas>
      <div id="fishymap-toolbar" class="not-prose" aria-label="Map windows">
        <button
          class="fishymap-toolbar-button"
          data-window-toggle="search"
          data-on:click="$_map_ui.windowUi.search.open = !$_map_ui.windowUi.search.open"
          type="button"
          data-attr:data-open="$_map_ui.windowUi.search.open ? 'true' : 'false'"
          data-attr:aria-pressed="$_map_ui.windowUi.search.open"
          data-attr:aria-label="$_map_ui.windowUi.search.open ? 'Hide search' : 'Show search'"
          data-attr:title="$_map_ui.windowUi.search.open ? 'Hide search' : 'Show search'"
        >
          <svg class="fishy-icon size-5" viewBox="0 0 24 24" aria-hidden="true"><use width="100%" height="100%" href="/img/icons.svg?v=20260324-9#fishy-magnifying-glass"></use></svg>
        </button>
        <button
          class="fishymap-toolbar-button"
          data-window-toggle="bookmarks"
          data-on:click="$_map_ui.windowUi.bookmarks.open = !$_map_ui.windowUi.bookmarks.open"
          type="button"
          data-attr:data-open="$_map_ui.windowUi.bookmarks.open ? 'true' : 'false'"
          data-attr:aria-pressed="$_map_ui.windowUi.bookmarks.open"
          data-attr:aria-label="$_map_ui.windowUi.bookmarks.open ? 'Hide bookmarks' : 'Show bookmarks'"
          data-attr:title="$_map_ui.windowUi.bookmarks.open ? 'Hide bookmarks' : 'Show bookmarks'"
        >
          <svg class="fishy-icon size-5" viewBox="0 0 24 24" aria-hidden="true"><use width="100%" height="100%" href="/img/icons.svg?v=20260324-9#fishy-bookmarks"></use></svg>
        </button>
        <button
          class="fishymap-toolbar-button"
          data-window-toggle="settings"
          data-on:click="$_map_ui.windowUi.settings.open = !$_map_ui.windowUi.settings.open"
          type="button"
          data-attr:data-open="$_map_ui.windowUi.settings.open ? 'true' : 'false'"
          data-attr:aria-pressed="$_map_ui.windowUi.settings.open"
          data-attr:aria-label="$_map_ui.windowUi.settings.open ? 'Hide settings' : 'Show settings'"
          data-attr:title="$_map_ui.windowUi.settings.open ? 'Hide settings' : 'Show settings'"
        >
          <svg class="fishy-icon size-5" viewBox="0 0 24 24" aria-hidden="true"><use width="100%" height="100%" href="/img/icons.svg?v=20260324-9#fishy-adjustments-horizontal"></use></svg>
        </button>
        <button
          class="fishymap-toolbar-button"
          data-window-toggle="zone-info"
          data-on:click="$_map_ui.windowUi.zoneInfo.open = !$_map_ui.windowUi.zoneInfo.open"
          type="button"
          data-attr:data-open="$_map_ui.windowUi.zoneInfo.open ? 'true' : 'false'"
          data-attr:aria-pressed="$_map_ui.windowUi.zoneInfo.open"
          data-attr:aria-label="$_map_ui.windowUi.zoneInfo.open ? 'Hide info' : 'Show info'"
          data-attr:title="$_map_ui.windowUi.zoneInfo.open ? 'Hide info' : 'Show info'"
        >
          <svg class="fishy-icon size-5" viewBox="0 0 24 24" aria-hidden="true"><use width="100%" height="100%" href="/img/icons.svg?v=20260324-9#fishy-information-circle"></use></svg>
        </button>
        <button
          class="fishymap-toolbar-button"
          data-window-toggle="layers"
          data-on:click="$_map_ui.windowUi.layers.open = !$_map_ui.windowUi.layers.open"
          type="button"
          data-attr:data-open="$_map_ui.windowUi.layers.open ? 'true' : 'false'"
          data-attr:aria-pressed="$_map_ui.windowUi.layers.open"
          data-attr:aria-label="$_map_ui.windowUi.layers.open ? 'Hide layers' : 'Show layers'"
          data-attr:title="$_map_ui.windowUi.layers.open ? 'Hide layers' : 'Show layers'"
        >
          <svg class="fishy-icon size-5" viewBox="0 0 24 24" aria-hidden="true"><use width="100%" height="100%" href="/img/icons.svg?v=20260324-9#fishy-squares-2x2"></use></svg>
        </button>
      </div>
      <aside
        id="fishymap-search-window"
        class="fishymap-window not-prose"
        data-window-id="search"
        data-show="$_map_ui.windowUi.search.open"
        data-attr:data-collapsed="$_map_ui.windowUi.search.collapsed ? 'true' : 'false'"
        style="display: none"
      >
        <div
          class="fishymap-window-header"
          id="fishymap-search-titlebar"
          data-window-titlebar="search"
          data-attr:aria-expanded="!$_map_ui.windowUi.search.collapsed"
        >
          <div class="fishymap-window-header-content">
            <svg class="fishy-icon fishymap-window-title-icon size-5" viewBox="0 0 24 24" aria-hidden="true"><use width="100%" height="100%" href="/img/icons.svg?v=20260324-9#fishy-magnifying-glass"></use></svg>
            <span id="fishymap-search-title-text" class="fishymap-window-title text-lg leading-tight">Search</span>
          </div>
          <label class="fishymap-search-title-input input input-bordered input-sm rounded-full" data-window-drag-ignore="true">
            <input
              id="fishymap-search"
              class="grow"
              type="search"
              placeholder="Search fish, zone, or filter term"
              autocomplete="off"
              data-bind="_map_ui.search.query"
              data-on:input="$_map_ui.search.open = true"
              data-on:focus="$_map_ui.search.open = true"
            >
            <span id="fishymap-search-count" class="badge badge-soft badge-primary badge-sm" hidden>0 matches</span>
          </label>
        </div>
        <div
          id="fishymap-search-body"
          class="fishymap-window-body"
          data-show="!$_map_ui.windowUi.search.collapsed"
          style="display: none"
        >
          <fishymap-search-panel id="fishymap-search-panel" class="not-prose"></fishymap-search-panel>
        </div>
      </aside>
      <aside
        id="fishymap-bookmarks-window"
        class="fishymap-window card card-border bg-base-100 not-prose"
        data-window-id="bookmarks"
        data-show="$_map_ui.windowUi.bookmarks.open"
        data-attr:data-collapsed="$_map_ui.windowUi.bookmarks.collapsed ? 'true' : 'false'"
        style="display: none"
      >
        <div
          class="fishymap-window-header"
          id="fishymap-bookmarks-titlebar"
          data-window-titlebar="bookmarks"
          role="button"
          tabindex="0"
          data-attr:aria-expanded="!$_map_ui.windowUi.bookmarks.collapsed"
        >
          <div class="fishymap-window-header-content">
            <svg class="fishy-icon fishymap-window-title-icon size-5" viewBox="0 0 24 24" aria-hidden="true"><use width="100%" height="100%" href="/img/icons.svg?v=20260324-9#fishy-bookmarks"></use></svg>
            <span class="fishymap-window-title text-lg leading-tight">Bookmarks</span>
          </div>
          <button id="fishymap-bookmark-place" class="btn btn-primary btn-sm" type="button">
            <svg class="fishy-icon size-4" viewBox="0 0 24 24" aria-hidden="true"><use width="100%" height="100%" href="/img/icons.svg?v=20260324-9#fishy-bookmark-add"></use></svg>
            <span id="fishymap-bookmark-place-label">New bookmark</span>
          </button>
        </div>
        <div
          id="fishymap-bookmarks-body"
          class="fishymap-window-body"
          data-show="!$_map_ui.windowUi.bookmarks.collapsed"
          style="display: none"
        >
          <div id="fishymap-bookmarks-controls">
            <div class="fishymap-bookmarks-controls-row fishymap-bookmarks-controls-row--primary">
              <button id="fishymap-bookmark-copy-selected" class="btn btn-primary btn-sm" type="button"><svg class="fishy-icon size-4" viewBox="0 0 24 24" aria-hidden="true"><use width="100%" height="100%" href="/img/icons.svg?v=20260324-9#fishy-copy"></use></svg>Copy</button>
              <button id="fishymap-bookmark-export" class="btn btn-soft btn-sm" type="button"><svg class="fishy-icon size-4" viewBox="0 0 24 24" aria-hidden="true"><use width="100%" height="100%" href="/img/icons.svg?v=20260324-9#fishy-export"></use></svg>Export</button>
              <button id="fishymap-bookmark-import-trigger" class="btn btn-soft btn-sm" type="button"><svg class="fishy-icon size-4" viewBox="0 0 24 24" aria-hidden="true"><use width="100%" height="100%" href="/img/icons.svg?v=20260324-9#fishy-import"></use></svg>Import</button>
              <button id="fishymap-bookmark-cancel" class="btn btn-ghost btn-sm" type="button" hidden><svg class="fishy-icon size-4" viewBox="0 0 24 24" aria-hidden="true"><use width="100%" height="100%" href="/img/icons.svg?v=20260324-9#fishy-clear"></use></svg>Cancel</button>
            </div>
            <div class="fishymap-bookmarks-controls-row fishymap-bookmarks-controls-row--secondary">
              <button id="fishymap-bookmark-select-all" class="btn btn-ghost btn-sm" type="button"><svg class="fishy-icon size-4" viewBox="0 0 24 24" aria-hidden="true"><use width="100%" height="100%" href="/img/icons.svg?v=20260324-9#fishy-select-all"></use></svg>Select all</button>
              <button id="fishymap-bookmark-clear-selection" class="btn btn-ghost btn-sm" type="button"><svg class="fishy-icon size-4" viewBox="0 0 24 24" aria-hidden="true"><use width="100%" height="100%" href="/img/icons.svg?v=20260324-9#fishy-clear"></use></svg><span id="fishymap-bookmark-clear-selection-label">Clear</span></button>
              <button id="fishymap-bookmark-delete-selected" class="btn btn-ghost btn-error btn-sm" type="button"><svg class="fishy-icon size-4" viewBox="0 0 24 24" aria-hidden="true"><use width="100%" height="100%" href="/img/icons.svg?v=20260324-9#fishy-trash"></use></svg>Delete</button>
            </div>
            <input id="fishymap-bookmark-import-input" class="hidden" type="file" accept=".xml,.txt,text/xml,application/xml">
          </div>
          <div id="fishymap-bookmarks-list" class="rounded-box border border-base-300/70 bg-base-200 p-1">
            <div class="fishymap-bookmark-empty text-sm text-base-content/65">
              No bookmarks yet.
            </div>
          </div>
        </div>
      </aside>
      <aside
        id="fishymap-zone-info-window"
        class="fishymap-window card card-border bg-base-100 not-prose"
        data-window-id="zoneInfo"
        data-show="$_map_ui.windowUi.zoneInfo.open"
        data-attr:data-collapsed="$_map_ui.windowUi.zoneInfo.collapsed ? 'true' : 'false'"
        style="display: none"
      >
        <div
          class="fishymap-window-header"
          id="fishymap-zone-info-titlebar"
          data-window-titlebar="zoneInfo"
          role="button"
          tabindex="0"
          data-attr:aria-expanded="!$_map_ui.windowUi.zoneInfo.collapsed"
        >
          <div class="fishymap-window-header-content">
            <span id="fishymap-zone-info-title-icon" class="fishy-icon fishymap-window-title-icon size-5" aria-hidden="true">
              <svg class="size-5" viewBox="0 0 24 24" aria-hidden="true"><use width="100%" height="100%" href="/img/icons.svg?v=20260324-9#fishy-information-circle"></use></svg>
            </span>
            <span id="fishymap-zone-info-title" class="fishymap-window-title truncate text-lg leading-tight">Info</span>
          </div>
          <span id="fishymap-zone-info-status" class="inline-flex min-w-0 items-center gap-2 text-xs text-base-content/60">
            <span id="fishymap-zone-info-status-icon" class="inline-flex text-base-content/55" aria-hidden="true">
              <svg class="size-4" viewBox="0 0 24 24" aria-hidden="true"><use width="100%" height="100%" href="/img/icons.svg?v=20260324-9#fishy-information-circle"></use></svg>
            </span>
            <span id="fishymap-zone-info-status-text" class="truncate">no selection</span>
          </span>
        </div>
        <div
          id="fishymap-zone-info-body"
          class="fishymap-window-body"
          data-show="!$_map_ui.windowUi.zoneInfo.collapsed"
          style="display: none"
        >
          <fishymap-info-panel id="fishymap-info-panel" class="space-y-3 not-prose"></fishymap-info-panel>
        </div>
      </aside>
      <aside
        id="fishymap-layers-window"
        class="fishymap-window card card-border bg-base-100 not-prose"
        data-window-id="layers"
        data-show="$_map_ui.windowUi.layers.open"
        data-attr:data-collapsed="$_map_ui.windowUi.layers.collapsed ? 'true' : 'false'"
        style="display: none"
      >
        <div
          class="fishymap-window-header"
          id="fishymap-layers-titlebar"
          data-window-titlebar="layers"
          role="button"
          tabindex="0"
          data-attr:aria-expanded="!$_map_ui.windowUi.layers.collapsed"
        >
          <div class="fishymap-window-header-content">
            <svg class="fishy-icon fishymap-window-title-icon size-5" viewBox="0 0 24 24" aria-hidden="true"><use width="100%" height="100%" href="/img/icons.svg?v=20260324-9#fishy-squares-2x2"></use></svg>
            <p class="fishymap-window-title text-lg leading-tight">Layers</p>
          </div>
          <span id="fishymap-layers-count" class="badge badge-outline badge-sm">0</span>
        </div>
        <div
          id="fishymap-layers-body"
          class="fishymap-window-body"
          data-show="!$_map_ui.windowUi.layers.collapsed"
          style="display: none"
        >
          <div id="fishymap-layers"></div>
        </div>
      </aside>
      <button
        id="fishymap-view-toggle"
        class="btn btn-primary"
        type="button"
        data-on:click="$_map_bridged.ui.viewMode = (($_map_bridged.ui.viewMode || $_map_session.view.viewMode || '2d') === '3d') ? '2d' : '3d'"
        data-attr:aria-label="(($_map_bridged.ui.viewMode || $_map_session.view.viewMode || '2d') === '3d') ? 'View mode: 3D. Click to switch to 2D.' : 'View mode: 2D. Click to switch to 3D.'"
        data-attr:title="(($_map_bridged.ui.viewMode || $_map_session.view.viewMode || '2d') === '3d') ? 'View mode: 3D. Click to switch to 2D.' : 'View mode: 2D. Click to switch to 3D.'"
      >
        <span id="fishymap-view-toggle-icon" aria-hidden="true">
          <svg class="fishy-icon size-5" viewBox="0 0 24 24" aria-hidden="true"><use width="100%" height="100%" href="/img/icons.svg?v=20260324-9#fishy-map-view"></use></svg>
        </span>
      </button>
      <aside
        id="fishymap-panel"
        class="fishymap-window card card-border bg-base-100 not-prose"
        data-window-id="settings"
        data-show="$_map_ui.windowUi.settings.open"
        data-attr:data-collapsed="$_map_ui.windowUi.settings.collapsed ? 'true' : 'false'"
        style="display: none"
      >
        <div
          class="fishymap-window-header"
          id="fishymap-panel-titlebar"
          data-window-titlebar="settings"
          role="button"
          tabindex="0"
          data-attr:aria-expanded="!$_map_ui.windowUi.settings.collapsed"
        >
          <div class="fishymap-window-header-content">
            <svg class="fishy-icon fishymap-window-title-icon size-5" viewBox="0 0 24 24" aria-hidden="true"><use width="100%" height="100%" href="/img/icons.svg?v=20260324-9#fishy-adjustments-horizontal"></use></svg>
            <p class="fishymap-window-title text-lg leading-tight">Settings</p>
          </div>
          <span
            id="fishymap-ready-pill"
            class="badge badge-sm gap-2 text-base-content/80"
            data-class:badge-success="$_map_runtime.ready"
            data-class:badge-outline="!$_map_runtime.ready"
          >
            <span class="loading loading-spinner loading-xs" aria-hidden="true" data-show="!$_map_runtime.ready" style="display: none"></span>
            <span data-text="$_map_runtime.ready ? 'Ready' : 'Loading'">Loading</span>
          </span>
        </div>

        <div
          id="fishymap-panel-body"
          class="fishymap-window-body flex flex-col gap-4 px-4 py-4"
          data-show="!$_map_ui.windowUi.settings.collapsed"
          style="display: none"
        >
          <div class="space-y-3">
            <fishymap-patch-picker id="fishymap-patch-picker" class="not-prose"></fishymap-patch-picker>

            <div class="flex flex-col gap-2">
              <button
                id="fishymap-reset-view"
                class="btn btn-outline btn-secondary btn-sm w-full"
                type="button"
                data-on:click="$_map_actions.resetViewToken = ($_map_actions.resetViewToken || 0) + 1"
              >Reset view</button>
              <button
                id="fishymap-reset-ui"
                class="btn btn-outline btn-sm w-full"
                type="button"
                data-on:click="$_map_actions.resetUiToken = ($_map_actions.resetUiToken || 0) + 1"
              >Reset UI</button>
            </div>

            <fieldset class="fieldset rounded-box border border-base-300/70 bg-base-200 p-4">
              <legend class="fieldset-legend px-1 text-sm font-semibold">Display</legend>
              <div class="space-y-3 pt-1">
                <label class="flex items-center justify-between gap-3 text-sm">
                  <span class="font-semibold">Auto-adjust view</span>
                  <input id="fishymap-auto-adjust-view" class="checkbox checkbox-sm checkbox-primary" type="checkbox" checked data-bind="_map_ui.windowUi.settings.autoAdjustView">
                </label>
              </div>
            </fieldset>
          </div>

          <details
            id="fishymap-diagnostics"
            class="collapse collapse-arrow border border-base-300/70 bg-base-200"
            data-attr:open="$_map_bridged.ui.diagnosticsOpen"
            data-on:toggle="$_map_bridged.ui.diagnosticsOpen = evt.currentTarget.open"
          >
            <summary class="collapse-title min-h-0 py-3 text-sm font-semibold">Diagnostics</summary>
            <div class="collapse-content space-y-3">
              <div id="fishymap-status-lines" class="space-y-1 text-xs text-base-content/70"></div>
              <pre id="fishymap-diagnostic-json" class="rounded-box border border-neutral/20 bg-neutral text-neutral-content p-3 text-[11px] leading-5">Waiting for bridge events…</pre>
            </div>
          </details>
        </div>
      </aside>

      <fishymap-hover-tooltip id="fishymap-hover-tooltip" class="card card-border bg-base-100 not-prose" hidden></fishymap-hover-tooltip>

      <div id="fishymap-error-overlay" class="card card-border border-error/40 bg-base-100 not-prose" hidden>
        <div class="space-y-3 px-4 py-4">
          <div class="flex items-center justify-between gap-3">
            <p class="fishymap-window-title text-lg leading-tight text-error">Map renderer unavailable</p>
            <span class="badge badge-error badge-sm">Error</span>
          </div>
          <p class="text-sm text-base-content/80">
            The webpage loaded, but the Bevy/WebGL renderer could not start.
          </p>
          <pre id="fishymap-error-message" class="rounded-box bg-neutral text-neutral-content p-3 text-[11px] leading-5"></pre>
        </div>
      </div>
    </div>
