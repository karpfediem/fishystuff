<div id="fishydex-app" class="not-prose"
     data-signals="{
       lang: { contentLang: '', locale: '', apiLang: '' },
       fish: [],
       revision: '',
       count: 0,
       search_query: '',
       caught_filter: 'all',
       favourite_filter: false,
       grade_filters: [],
       method_filters: [],
       show_dried: false,
       sort_field: 'price',
       sort_direction: 'desc',
       catalog_view: 'grade',
       _shared_fish: {
         caughtIds: [],
         favouriteIds: [],
       },
       _selected_fish_id: 0,
       _progress_panel_collapsed: false,
       _filter_panel_collapsed: false,
       catalog_count: 0,
       total_count: 0,
       visible_count: 0,
       caught_count: 0,
       completion_percent: 0,
       red_total_count: 0,
       red_caught_count: 0,
       red_completion_percent: 0,
       yellow_total_count: 0,
       yellow_caught_count: 0,
       yellow_completion_percent: 0,
       blue_total_count: 0,
       blue_caught_count: 0,
       blue_completion_percent: 0,
       green_total_count: 0,
       green_caught_count: 0,
       green_completion_percent: 0,
       white_total_count: 0,
       white_caught_count: 0,
       white_completion_percent: 0,
       supports_grade_filter: false,
       supports_method_filter: false,
       supports_dried_filter: false,
       supports_guide_view: false,
       _loading: true,
       _caught_stamp_fish_id: null,
       _favourite_stamp_fish_id: null,
       _fishydex_actions: {
         exportCaughtToken: 0,
         importCaughtToken: 0,
         closeDetailsToken: 0,
       },
       _status_message: '',
       _api_error_message: '',
       _api_error_hint: '',
     }"
     data-indicator:_loading
     data-init="window.Fishydex.restore($); @get(window.Fishydex.fishApiUrl())">
  <section class="fishydex-shell">
    <div class="fishydex-bento">
      <fieldset class="fishydex-stats card card-border bg-base-100">
        <legend class="fishydex-panel-legend fieldset-legend ml-6 px-2">
          <span class="fishydex-panel-label"><svg class="fishy-icon fishy-icon--inline size-5" viewBox="0 0 24 24" aria-hidden="true"><use width="100%" height="100%" href="/img/icons.svg?v=20260419-2#fishy-chart-pie-2-fill"></use></svg><span data-i18n-text="fishydex.progress.panel"></span></span>
          <button type="button"
                  class="fishydex-panel-toggle btn btn-ghost btn-xs btn-circle"
                  data-panel-toggle="progress"
                  aria-controls="fishydex-progress-body"
                  data-class:is-collapsed="$_progress_panel_collapsed"
                  data-attr:aria-expanded="(!$_progress_panel_collapsed).toString()"
                  data-attr:aria-label="window.Fishydex.panelToggleLabel($_progress_panel_collapsed, 'progress')"
                  data-attr:title="window.Fishydex.panelToggleLabel($_progress_panel_collapsed, 'progress')"
                  data-on:click="$_progress_panel_collapsed = !$_progress_panel_collapsed"><svg class="fishy-icon fishy-icon--inline size-4" viewBox="0 0 24 24" aria-hidden="true"><use width="100%" height="100%" href="/img/icons.svg?v=20260419-2#fishy-caret-down"></use></svg></button>
        </legend>
        <div id="fishydex-progress-body" class="card-body fishydex-stats-body pt-0" data-show="!$_progress_panel_collapsed">
        <div class="fishydex-progress-overview rounded-box border border-base-300 bg-base-200">
          <div class="fishydex-progress-overview-chart">
            <div class="radial-progress fishydex-progress-pie is-overall"
                 role="progressbar"
                 aria-valuemin="0"
                 aria-valuemax="100"
                 data-attr:style="'--value:' + ($completion_percent || 0) + '; --size:7.5rem; --thickness:0.72rem;'"
                 data-attr:aria-valuenow="String($completion_percent || 0)"
                 data-attr:aria-label="window.Fishydex.progressAriaLabel('catalog', $caught_count || 0, $catalog_count || 0, $completion_percent || 0)">
              <span class="fishydex-progress-pie-value" data-text="($completion_percent || 0) + '%'"></span>
            </div>
          </div>
          <div class="fishydex-progress-overview-copy">
            <span class="fishydex-progress-kicker" data-i18n-text="fishydex.progress.kicker"></span>
            <span class="fishydex-progress-title" data-i18n-text="fishydex.progress.title"></span>
            <span class="fishydex-progress-count" data-text="($caught_count || 0) + ' / ' + ($catalog_count || 0)"></span>
            <span class="fishydex-subtle"
                  data-text="window.Fishydex.remainingLabel($catalog_count || 0, $caught_count || 0, 'fishydex.progress.empty')"></span>
          </div>
        </div>
          <div class="fishydex-grade-stats" data-show="$supports_grade_filter">
            <div class="fishydex-grade-progress-card rounded-box border border-base-300 bg-base-200">
              <div class="radial-progress fishydex-progress-pie grade-red"
                   role="progressbar"
                   aria-valuemin="0"
                   aria-valuemax="100"
                   data-attr:style="'--value:' + ($red_completion_percent || 0) + '; --size:4.85rem; --thickness:0.48rem;'"
                   data-attr:aria-valuenow="String($red_completion_percent || 0)"
                   data-attr:aria-label="window.Fishydex.progressAriaLabel('red', $red_caught_count || 0, $red_total_count || 0, $red_completion_percent || 0)">
                <span class="fishydex-grade-progress-percent" data-text="($red_completion_percent || 0) + '%'"></span>
              </div>
              <div class="fishydex-grade-progress-copy">
                <div class="fishydex-grade-progress-title grade-red" data-i18n-text="fishydex.group.grade.red"></div>
                <div class="fishydex-grade-progress-value" data-text="($red_caught_count || 0) + ' / ' + ($red_total_count || 0)"></div>
                <div class="fishydex-grade-progress-meta"
                     data-text="window.Fishydex.remainingLabel($red_total_count || 0, $red_caught_count || 0, 'fishydex.progress.empty_grade')"></div>
              </div>
            </div>
            <div class="fishydex-grade-progress-card rounded-box border border-base-300 bg-base-200">
              <div class="radial-progress fishydex-progress-pie grade-yellow"
                   role="progressbar"
                   aria-valuemin="0"
                   aria-valuemax="100"
                   data-attr:style="'--value:' + ($yellow_completion_percent || 0) + '; --size:4.85rem; --thickness:0.48rem;'"
                   data-attr:aria-valuenow="String($yellow_completion_percent || 0)"
                   data-attr:aria-label="window.Fishydex.progressAriaLabel('yellow', $yellow_caught_count || 0, $yellow_total_count || 0, $yellow_completion_percent || 0)">
                <span class="fishydex-grade-progress-percent" data-text="($yellow_completion_percent || 0) + '%'"></span>
              </div>
              <div class="fishydex-grade-progress-copy">
                <div class="fishydex-grade-progress-title grade-yellow" data-i18n-text="fishydex.group.grade.yellow"></div>
                <div class="fishydex-grade-progress-value" data-text="($yellow_caught_count || 0) + ' / ' + ($yellow_total_count || 0)"></div>
                <div class="fishydex-grade-progress-meta"
                     data-text="window.Fishydex.remainingLabel($yellow_total_count || 0, $yellow_caught_count || 0, 'fishydex.progress.empty_grade')"></div>
              </div>
            </div>
            <div class="fishydex-grade-progress-card rounded-box border border-base-300 bg-base-200">
              <div class="radial-progress fishydex-progress-pie grade-blue"
                   role="progressbar"
                   aria-valuemin="0"
                   aria-valuemax="100"
                   data-attr:style="'--value:' + ($blue_completion_percent || 0) + '; --size:4.85rem; --thickness:0.48rem;'"
                   data-attr:aria-valuenow="String($blue_completion_percent || 0)"
                   data-attr:aria-label="window.Fishydex.progressAriaLabel('blue', $blue_caught_count || 0, $blue_total_count || 0, $blue_completion_percent || 0)">
                <span class="fishydex-grade-progress-percent" data-text="($blue_completion_percent || 0) + '%'"></span>
              </div>
              <div class="fishydex-grade-progress-copy">
                <div class="fishydex-grade-progress-title grade-blue" data-i18n-text="fishydex.group.grade.blue"></div>
                <div class="fishydex-grade-progress-value" data-text="($blue_caught_count || 0) + ' / ' + ($blue_total_count || 0)"></div>
                <div class="fishydex-grade-progress-meta"
                     data-text="window.Fishydex.remainingLabel($blue_total_count || 0, $blue_caught_count || 0, 'fishydex.progress.empty_grade')"></div>
              </div>
            </div>
            <div class="fishydex-grade-progress-card rounded-box border border-base-300 bg-base-200">
              <div class="radial-progress fishydex-progress-pie grade-green"
                   role="progressbar"
                   aria-valuemin="0"
                   aria-valuemax="100"
                   data-attr:style="'--value:' + ($green_completion_percent || 0) + '; --size:4.85rem; --thickness:0.48rem;'"
                   data-attr:aria-valuenow="String($green_completion_percent || 0)"
                   data-attr:aria-label="window.Fishydex.progressAriaLabel('green', $green_caught_count || 0, $green_total_count || 0, $green_completion_percent || 0)">
                <span class="fishydex-grade-progress-percent" data-text="($green_completion_percent || 0) + '%'"></span>
              </div>
              <div class="fishydex-grade-progress-copy">
                <div class="fishydex-grade-progress-title grade-green" data-i18n-text="fishydex.group.grade.green"></div>
                <div class="fishydex-grade-progress-value" data-text="($green_caught_count || 0) + ' / ' + ($green_total_count || 0)"></div>
                <div class="fishydex-grade-progress-meta"
                     data-text="window.Fishydex.remainingLabel($green_total_count || 0, $green_caught_count || 0, 'fishydex.progress.empty_grade')"></div>
              </div>
            </div>
            <div class="fishydex-grade-progress-card rounded-box border border-base-300 bg-base-200">
              <div class="radial-progress fishydex-progress-pie grade-white"
                   role="progressbar"
                   aria-valuemin="0"
                   aria-valuemax="100"
                   data-attr:style="'--value:' + ($white_completion_percent || 0) + '; --size:4.85rem; --thickness:0.48rem;'"
                   data-attr:aria-valuenow="String($white_completion_percent || 0)"
                   data-attr:aria-label="window.Fishydex.progressAriaLabel('white', $white_caught_count || 0, $white_total_count || 0, $white_completion_percent || 0)">
                <span class="fishydex-grade-progress-percent" data-text="($white_completion_percent || 0) + '%'"></span>
              </div>
              <div class="fishydex-grade-progress-copy">
                <div class="fishydex-grade-progress-title grade-white" data-i18n-text="fishydex.group.grade.white"></div>
                <div class="fishydex-grade-progress-value" data-text="($white_caught_count || 0) + ' / ' + ($white_total_count || 0)"></div>
                <div class="fishydex-grade-progress-meta"
                     data-text="window.Fishydex.remainingLabel($white_total_count || 0, $white_caught_count || 0, 'fishydex.progress.empty_grade')"></div>
              </div>
            </div>
          </div>
        <div class="fishydex-actions">
          <button type="button"
                  class="btn btn-sm btn-soft btn-primary fishydex-button"
                  data-on:click="$_fishydex_actions.exportCaughtToken = ($_fishydex_actions.exportCaughtToken || 0) + 1"
                  data-i18n-text="fishydex.progress.export"></button>
          <button type="button"
                  class="btn btn-sm btn-outline fishydex-button"
                  data-on:click="$_fishydex_actions.importCaughtToken = ($_fishydex_actions.importCaughtToken || 0) + 1"
                  data-i18n-text="fishydex.progress.import"></button>
        </div>
        </div>
      </fieldset>

      <fieldset class="fishydex-screen card card-border bg-base-100">
        <legend class="fishydex-panel-legend fieldset-legend ml-6 px-2">
          <span class="fishydex-panel-label"><svg class="fishy-icon fishy-icon--inline size-5" viewBox="0 0 24 24" aria-hidden="true"><use width="100%" height="100%" href="/img/icons.svg?v=20260419-2#fishy-filter-2-fill"></use></svg><span data-i18n-text="fishydex.filter.panel"></span></span>
          <button type="button"
                  class="fishydex-panel-toggle btn btn-ghost btn-xs btn-circle"
                  data-panel-toggle="filter"
                  aria-controls="fishydex-filter-body"
                  data-class:is-collapsed="$_filter_panel_collapsed"
                  data-attr:aria-expanded="(!$_filter_panel_collapsed).toString()"
                  data-attr:aria-label="window.Fishydex.panelToggleLabel($_filter_panel_collapsed, 'filter')"
                  data-attr:title="window.Fishydex.panelToggleLabel($_filter_panel_collapsed, 'filter')"
                  data-on:click="$_filter_panel_collapsed = !$_filter_panel_collapsed"><svg class="fishy-icon fishy-icon--inline size-4" viewBox="0 0 24 24" aria-hidden="true"><use width="100%" height="100%" href="/img/icons.svg?v=20260419-2#fishy-caret-down"></use></svg></button>
        </legend>
        <div id="fishydex-filter-body" class="card-body fishydex-panel-body pt-0" data-show="!$_filter_panel_collapsed">
        <div class="fishydex-controls">
          <fieldset class="fishydex-filter-group fieldset rounded-box border border-base-300 bg-base-200 p-4">
            <legend class="fieldset-legend" data-i18n-text="fishydex.filter.search.legend"></legend>
            <label class="fishydex-search-field input input-bordered">
              <svg class="fishy-icon fishy-icon--inline h-[1em] opacity-50" viewBox="0 0 24 24" aria-hidden="true"><use width="100%" height="100%" href="/img/icons.svg?v=20260419-2#fishy-search-field"></use></svg>
              <span class="sr-only" data-i18n-text="fishydex.filter.search.sr"></span>
              <input class="fishydex-search"
                     type="search"
                     autocomplete="off"
                     data-i18n-attr-placeholder="fishydex.filter.search.placeholder"
                     placeholder=""
                     data-bind:search_query>
            </label>
          </fieldset>

          <div class="fishydex-filter-stack">
            <fieldset class="fishydex-filter-group fieldset rounded-box border border-base-300 bg-base-200 p-4">
              <legend class="fieldset-legend" data-i18n-text="fishydex.filter.status.legend"></legend>
              <div class="fishydex-filter-chips" role="group" data-i18n-attr-aria-label="fishydex.filter.status.group" aria-label="">
                <button type="button"
                        class="btn btn-sm btn-outline fishydex-filter-chip"
                        data-class:is-active="$caught_filter === 'all'"
                        data-class:btn-active="$caught_filter === 'all'"
                        data-attr:aria-pressed="($caught_filter === 'all').toString()"
                        data-on:click="$caught_filter = 'all'"
                        data-i18n-text="fishydex.filter.status.all"></button>
                <button type="button"
                        class="btn btn-sm btn-outline fishydex-filter-chip filter-caught"
                        data-class:is-active="$caught_filter === 'caught'"
                        data-class:btn-active="$caught_filter === 'caught'"
                        data-attr:aria-pressed="($caught_filter === 'caught').toString()"
                        data-on:click="$caught_filter = 'caught'"><svg class="fishy-icon fishy-icon--inline size-5" viewBox="0 0 24 24" aria-hidden="true"><use width="100%" height="100%" href="/img/icons.svg?v=20260419-2#fishy-check-badge-solid"></use></svg><span data-i18n-text="fishydex.filter.status.caught"></span></button>
                <button type="button"
                        class="btn btn-sm btn-outline fishydex-filter-chip filter-missing"
                        data-class:is-active="$caught_filter === 'missing'"
                        data-class:btn-active="$caught_filter === 'missing'"
                        data-attr:aria-pressed="($caught_filter === 'missing').toString()"
                        data-on:click="$caught_filter = 'missing'"><svg class="fishy-icon fishy-icon--inline size-5" viewBox="0 0 24 24" aria-hidden="true"><use width="100%" height="100%" href="/img/icons.svg?v=20260419-2#fishy-check-circle-dash-fill"></use></svg><span data-i18n-text="fishydex.filter.status.missing"></span></button>
                <button type="button"
                        class="btn btn-sm btn-outline fishydex-filter-chip filter-favourite"
                        data-class:is-active="$favourite_filter"
                        data-class:btn-active="$favourite_filter"
                        data-attr:aria-pressed="$favourite_filter.toString()"
                        data-on:click="$favourite_filter = !$favourite_filter"><svg class="fishy-icon fishy-icon--inline size-5" viewBox="0 0 24 24" aria-hidden="true"><use width="100%" height="100%" href="/img/icons.svg?v=20260419-2#fishy-heart-fill"></use></svg><span data-i18n-text="fishydex.filter.status.favourite"></span></button>
              </div>
            </fieldset>

            <fieldset class="fishydex-filter-group fieldset rounded-box border border-base-300 bg-base-200 p-4"
                      data-show="$supports_grade_filter">
              <legend class="fieldset-legend" data-i18n-text="fishydex.filter.grade.legend"></legend>
              <div class="fishydex-filter-chips" role="group" data-i18n-attr-aria-label="fishydex.filter.grade.group" aria-label="">
                <button type="button"
                        class="btn btn-sm btn-outline fishydex-filter-chip grade-red"
                        data-class:is-active="($grade_filters || []).includes('red')"
                        data-class:btn-active="($grade_filters || []).includes('red')"
                        data-attr:aria-pressed="(($grade_filters || []).includes('red')).toString()"
                        data-on:click="$grade_filters = window.__fishystuffDatastarState.toggleOrderedValue($grade_filters, 'red', ['red', 'yellow', 'blue', 'green', 'white'])"
                        data-i18n-text="fishydex.group.grade.red"></button>
                <button type="button"
                        class="btn btn-sm btn-outline fishydex-filter-chip grade-yellow"
                        data-class:is-active="($grade_filters || []).includes('yellow')"
                        data-class:btn-active="($grade_filters || []).includes('yellow')"
                        data-attr:aria-pressed="(($grade_filters || []).includes('yellow')).toString()"
                        data-on:click="$grade_filters = window.__fishystuffDatastarState.toggleOrderedValue($grade_filters, 'yellow', ['red', 'yellow', 'blue', 'green', 'white'])"
                        data-i18n-text="fishydex.group.grade.yellow"></button>
                <button type="button"
                        class="btn btn-sm btn-outline fishydex-filter-chip grade-blue"
                        data-class:is-active="($grade_filters || []).includes('blue')"
                        data-class:btn-active="($grade_filters || []).includes('blue')"
                        data-attr:aria-pressed="(($grade_filters || []).includes('blue')).toString()"
                        data-on:click="$grade_filters = window.__fishystuffDatastarState.toggleOrderedValue($grade_filters, 'blue', ['red', 'yellow', 'blue', 'green', 'white'])"
                        data-i18n-text="fishydex.group.grade.blue"></button>
                <button type="button"
                        class="btn btn-sm btn-outline fishydex-filter-chip grade-green"
                        data-class:is-active="($grade_filters || []).includes('green')"
                        data-class:btn-active="($grade_filters || []).includes('green')"
                        data-attr:aria-pressed="(($grade_filters || []).includes('green')).toString()"
                        data-on:click="$grade_filters = window.__fishystuffDatastarState.toggleOrderedValue($grade_filters, 'green', ['red', 'yellow', 'blue', 'green', 'white'])"
                        data-i18n-text="fishydex.group.grade.green"></button>
                <button type="button"
                        class="btn btn-sm btn-outline fishydex-filter-chip grade-white"
                        data-class:is-active="($grade_filters || []).includes('white')"
                        data-class:btn-active="($grade_filters || []).includes('white')"
                        data-attr:aria-pressed="(($grade_filters || []).includes('white')).toString()"
                        data-on:click="$grade_filters = window.__fishystuffDatastarState.toggleOrderedValue($grade_filters, 'white', ['red', 'yellow', 'blue', 'green', 'white'])"
                        data-i18n-text="fishydex.group.grade.white"></button>
              </div>
            </fieldset>

            <fieldset class="fishydex-filter-group fieldset rounded-box border border-base-300 bg-base-200 p-4"
                      data-show="$supports_method_filter || $supports_dried_filter">
              <legend class="fieldset-legend" data-i18n-text="fishydex.filter.method.legend"></legend>
              <div class="fishydex-filter-chips" role="group" data-i18n-attr-aria-label="fishydex.filter.method.group" aria-label="">
                <button type="button"
                        class="btn btn-sm btn-outline fishydex-filter-chip"
                        data-show="$supports_method_filter"
                        data-class:is-active="($method_filters || []).length === 0"
                        data-class:btn-active="($method_filters || []).length === 0"
                        data-attr:aria-pressed="(($method_filters || []).length === 0).toString()"
                        data-on:click="$method_filters = []"
                        data-i18n-text="fishydex.filter.status.all"></button>
                <button type="button"
                        class="btn btn-sm btn-outline fishydex-filter-chip filter-rod"
                        data-show="$supports_method_filter"
                        data-class:is-active="($method_filters || []).includes('rod')"
                        data-class:btn-active="($method_filters || []).includes('rod')"
                        data-attr:aria-pressed="(($method_filters || []).includes('rod')).toString()"
                        data-on:click="$method_filters = window.__fishystuffDatastarState.toggleOrderedValue($method_filters, 'rod', ['rod', 'harpoon'])"
                        data-i18n-text="fishydex.filter.method.rod"></button>
                <button type="button"
                        class="btn btn-sm btn-outline fishydex-filter-chip filter-harpoon"
                        data-show="$supports_method_filter"
                        data-class:is-active="($method_filters || []).includes('harpoon')"
                        data-class:btn-active="($method_filters || []).includes('harpoon')"
                        data-attr:aria-pressed="(($method_filters || []).includes('harpoon')).toString()"
                        data-on:click="$method_filters = window.__fishystuffDatastarState.toggleOrderedValue($method_filters, 'harpoon', ['rod', 'harpoon'])"
                        data-i18n-text="fishydex.filter.method.harpoon"></button>
                <button type="button"
                        data-show="$supports_dried_filter"
                        class="btn btn-sm btn-outline fishydex-filter-chip filter-show-dried"
                        data-class:is-active="$show_dried"
                        data-class:btn-active="$show_dried"
                        data-attr:aria-pressed="$show_dried.toString()"
                        data-on:click="$show_dried = !$show_dried"
                        data-i18n-text="fishydex.filter.method.show_dried"></button>
              </div>
            </fieldset>

            <div class="fishydex-filter-meta">
              <span class="fishydex-filter-count"
                    data-text="window.Fishydex.matchesLabel($visible_count || 0, $catalog_count || 0)"></span>
              <button type="button"
                      class="btn btn-sm btn-soft fishydex-filter-clear"
                      data-on:click="$search_query = ''; $caught_filter = 'all'; $favourite_filter = false; $grade_filters = []; $method_filters = []; $show_dried = false"
                      data-i18n-text="fishydex.filter.clear"></button>
            </div>
          </div>

          <div class="fishydex-status" data-show="($_status_message || '').length > 0">
            <strong data-i18n-text="fishydex.filter.status_label"></strong>
            <span data-text="$_status_message"></span>
          </div>

          <div class="fishydex-error" data-show="($_api_error_message || '').length > 0">
            <strong data-text="$_api_error_message"></strong>
            <div class="fishydex-subtle" data-show="($_api_error_hint || '').length > 0" data-text="$_api_error_hint"></div>
          </div>
        </div>
        </div>
      </fieldset>
    </div>

    <fieldset class="fishydex-grid-shell card card-border bg-base-100">
      <legend class="fishydex-panel-legend fieldset-legend ml-6 px-2">
        <span class="fishydex-panel-label"><svg class="fishy-icon fishy-icon--inline size-5" viewBox="0 0 24 24" aria-hidden="true"><use width="100%" height="100%" href="/img/icons.svg?v=20260419-2#fishy-nav-dex"></use></svg><span data-i18n-text="fishydex.catalog.panel"></span></span>
        <span class="fishydex-panel-controls" role="group" data-i18n-attr-aria-label="fishydex.catalog.controls" aria-label="">
          <span class="join" role="group" data-i18n-attr-aria-label="fishydex.catalog.view" aria-label="">
            <button type="button"
                    class="btn btn-sm btn-ghost join-item"
                    data-show="$supports_guide_view"
                    data-class:is-active="$catalog_view === 'guide'"
                    data-attr:aria-pressed="($catalog_view === 'guide').toString()"
                    data-on:click="$catalog_view = 'guide'"
                    data-i18n-text="fishydex.catalog.view.guide"></button>
