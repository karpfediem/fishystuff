<div id="calculator"
     class="not-prose grid gap-6"
     data-signals="{ _loading: true, _calculator_ui: { top_level_tab: 'mode', distribution_tab: 'groups', pinned_layout: [[['overview']], [['zone'], ['session']], [['bite_time'], ['loot']]], pinned_sections: ['overview', 'zone', 'session', 'bite_time', 'loot'], unpinned_insert_index: [0, 0] }, _calculator_actions: { copyUrlToken: 0, copyShareToken: 0, clearToken: 0, resetLayoutToken: 0 } }"
     data-init__delay.50ms="window.__fishystuffCalculator.restore($); @get(window.__fishystuffCalculator.initUrl())">
    <section data-show="$_loading" class="card card-border bg-base-100">
        <div class="card-body">
            <span class="loading loading-spinner loading-md"></span>
            <p class="text-sm text-base-content/70" data-i18n-text="calculator.loading"></p>
        </div>
    </section>

    <div id="calculator-app"></div>
</div>
