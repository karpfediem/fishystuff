    <script>
        (function () {
            var nav = document.getElementById("menu");
            if (!nav) return;

            var root = document.documentElement;
            var raf = 0;

            function syncNavOffset() {
                raf = 0;
                root.style.setProperty("--site-nav-offset", nav.offsetHeight + "px");
            }

            function queueSync() {
                if (raf) return;
                raf = requestAnimationFrame(syncNavOffset);
            }

            queueSync();
            window.addEventListener("load", queueSync, { passive: true });
            window.addEventListener("resize", queueSync, { passive: true });

            if ("ResizeObserver" in window) {
                var observer = new ResizeObserver(queueSync);
                observer.observe(nav);
            }
        })();
    </script>

    <script>
        (function () {
            var root = document.documentElement;
            var theme = window.__theme;
            if (!theme || typeof theme.get !== "function" || typeof theme.set !== "function") {
                return;
            }

            function currentThemeName() {
                return theme.get() || "system";
            }

            function syncThemeLabels(name) {
                document.querySelectorAll("[data-theme-current-label]").forEach(function (el) {
                    el.textContent = name;
                });
            }

            function syncThemePanels(name) {
                document.querySelectorAll("[data-theme-panel]").forEach(function (panel) {
                    panel.querySelectorAll(".theme-item").forEach(function (el) {
                        var is = el.getAttribute("data-theme-name") === name;
                        el.setAttribute("aria-checked", String(is));
                        el.classList.toggle("bg-base-200", is);
                        el.classList.toggle("border-base-content", is);
                        el.classList.toggle("shadow-sm", is);
                        var state = el.querySelector(".theme-item-state");
                        if (state) {
                            state.textContent = is ? "Active" : "Saved";
                            state.classList.toggle("badge-primary", is);
                            state.classList.toggle("badge-ghost", !is);
                        }
                    });
                });
            }

            function syncThemeUi() {
                var name = currentThemeName();
                syncThemeLabels(name);
                syncThemePanels(name);
            }

            document.addEventListener("click", function (e) {
                var item = e.target.closest("[data-theme-panel] .theme-item");
                if (!item) return;
                var name = item.getAttribute("data-theme-name");
                if (!name) return;
                theme.set(name);
                root.setAttribute("data-theme", theme.resolve(name));
                syncThemeUi();
            });

            window.addEventListener("fishystuff:themechange", function () {
                syncThemeUi();
            });

            try {
                var mq = matchMedia("(prefers-color-scheme: dark)");
                if (mq && typeof mq.addEventListener === "function") {
                    mq.addEventListener("change", function () {
                        if (currentThemeName() === "system") {
                            syncThemeUi();
                        }
                    });
                }
            } catch (_) {}

            syncThemeUi();
        })();
    </script>

    <!-- Same-page language switcher (static two-locale helper) -->
    <script>
        (function () {
            try {
                var dePrefix = "/de-DE/";
                var path = location.pathname;
                if (!path.startsWith("/")) path = "/" + path;
                var dropdown = document.getElementById("language-switcher");
                var label = document.getElementById("language-switcher-label");
                var toEn = document.querySelector('#language-switcher a[data-locale="en-US"]');
                var toDe = document.querySelector('#language-switcher a[data-locale="de-DE"]');
                if (!dropdown || !toEn || !toDe) return;
                var isDe = path === dePrefix || path.startsWith(dePrefix);
                var enPath = isDe ? path.slice(dePrefix.length - 1) : path;
                if (enPath.length === 0) enPath = "/";
                var dePath = isDe ? path : (dePrefix + (path.startsWith("/") ? path.slice(1) : path));
                enPath = enPath.replace(/\/{2,}/g, "/");
                dePath = dePath.replace(/\/{2,}/g, "/");
                toEn.setAttribute("href", enPath);
                toDe.setAttribute("href", dePath);
                toEn.classList.toggle("active", !isDe);
                toDe.classList.toggle("active", isDe);
                if (!isDe) {
                    toEn.setAttribute("aria-current", "page");
                    toDe.removeAttribute("aria-current");
                } else {
                    toDe.setAttribute("aria-current", "page");
                    toEn.removeAttribute("aria-current");
                }
                if (label) {
                    label.textContent = isDe ? "DE-DE" : "EN-US";
                }
            } catch (_) {}
        })();
    </script>
