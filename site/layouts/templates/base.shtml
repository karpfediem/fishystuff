<!DOCTYPE html>
<html data-theme="fishy">
<head id="head">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title id="title"><super> | FishyStuff</title>

  <!-- Early load to prevent flashbang / layout shift due to scrollbar gutter -->
  <style>
    /* Helps browsers choose the correct default palette for form controls, etc. */
    :root { color-scheme: dark light; }

    /* Prevent layout shift when the vertical scrollbar toggles */
    html {
      /* Always allocate space for the scrollbar */
      overflow-y: scroll;

      /* Reserve the gutter so the content width is stable */
      scrollbar-gutter: stable;
    }

    /* If supported, reserve on both edges to keep centering perfectly stable */
    @supports (scrollbar-gutter: stable both-edges) {
      html { scrollbar-gutter: stable both-edges; }
    }
  </style>
  <script>
    (function () {
      var KEY = 'theme'; // 'system' | 'fishy' | 'dark' | 'light'
      var saved = localStorage.getItem(KEY) || 'system';

      function resolve(theme) {
        if (theme === 'system') {
          var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          return prefersDark ? 'fishy' : 'light'; // map system→fishy or light
        }
        return theme;
      }

      var active = resolve(saved);
      document.documentElement.setAttribute('data-theme', active);
    })();
  </script>
  <script src="/runtime-config.js"></script>
  <script>
    (function () {
      function normalizeBaseUrl(value) {
        return String(value || '').trim().replace(/\/+$/, '');
      }

      function isLoopbackHost(hostname) {
        return hostname === '127.0.0.1' || hostname === 'localhost';
      }

      function harmonizeLoopbackBaseUrl(value, locationLike) {
        var normalized = normalizeBaseUrl(value);
        if (!normalized) {
          return '';
        }
        try {
          var url = new URL(normalized, locationLike && locationLike.href ? locationLike.href : undefined);
          if (
            locationLike
            && isLoopbackHost(url.hostname)
            && isLoopbackHost(locationLike.hostname)
            && url.hostname !== locationLike.hostname
          ) {
            url.hostname = locationLike.hostname;
          }
          return normalizeBaseUrl(url.toString());
        } catch (_) {
          return normalized;
        }
      }

      function loopbackAwareFallback(locationLike, port, productionBase) {
        if (locationLike && isLoopbackHost(locationLike.hostname)) {
          var protocol = locationLike.protocol === 'https:' ? 'https:' : 'http:';
          return normalizeBaseUrl(protocol + '//' + locationLike.hostname + ':' + port);
        }
        return normalizeBaseUrl(productionBase);
      }

      function pickBaseUrl(params, runtimeConfig, queryKey, runtimeKey, fallback) {
        return (
          harmonizeLoopbackBaseUrl(params.get(queryKey), window.location)
          || harmonizeLoopbackBaseUrl(runtimeConfig && runtimeConfig[runtimeKey], window.location)
          || fallback
        );
      }

      function joinBaseUrl(baseUrl, rawPath) {
        var path = String(rawPath || '').trim();
        if (!path) {
          return '';
        }
        if (
          path.startsWith('http://')
          || path.startsWith('https://')
          || path.startsWith('data:')
        ) {
          return path;
        }
        var base = normalizeBaseUrl(baseUrl);
        if (!base) {
          return path;
        }
        if (path.startsWith('/')) {
          return base + path;
        }
        return base + '/' + path.replace(/^\/+/, '');
      }

      function zeroPad(value, width) {
        var numeric = Number.parseInt(value, 10);
        if (!Number.isFinite(numeric) || numeric <= 0) {
          return '';
        }
        return String(numeric).padStart(width, '0');
      }

      function fishItemIconPath(itemId) {
        var digits = zeroPad(itemId, 8);
        return digits ? '/images/FishIcons/' + digits + '.png' : '';
      }

      function fishEncyclopediaIconPath(encyclopediaId) {
        var digits = zeroPad(encyclopediaId, 5);
        return digits ? '/images/FishIcons/IC_' + digits + '.png' : '';
      }

      var runtimeConfig = window.__fishystuffRuntimeConfig || {};
      var params = new URLSearchParams(window.location.search || '');
      window.__fishystuffSiteBaseUrl = pickBaseUrl(
        params,
        runtimeConfig,
        'site_base',
        'siteBaseUrl',
        loopbackAwareFallback(window.location, '1990', normalizeBaseUrl(window.location.origin) || 'https://fishystuff.fish'),
      );
      window.__fishystuffApiBaseUrl = pickBaseUrl(
        params,
        runtimeConfig,
        'api_base',
        'apiBaseUrl',
        loopbackAwareFallback(window.location, '8080', 'https://api.fishystuff.fish'),
      );
      window.__fishystuffCdnBaseUrl = pickBaseUrl(
        params,
        runtimeConfig,
        'cdn_base',
        'cdnBaseUrl',
        loopbackAwareFallback(window.location, '4040', 'https://cdn.fishystuff.fish'),
      );
      window.__fishystuffResolveSiteUrl = function (path) {
        return joinBaseUrl(window.__fishystuffSiteBaseUrl, path);
      };
      window.__fishystuffResolveApiUrl = function (path) {
        return joinBaseUrl(window.__fishystuffApiBaseUrl, path);
      };
      window.__fishystuffResolveCdnUrl = function (path) {
        return joinBaseUrl(window.__fishystuffCdnBaseUrl, path);
      };
      window.__fishystuffFishItemIconPath = fishItemIconPath;
      window.__fishystuffFishEncyclopediaIconPath = fishEncyclopediaIconPath;
      window.__fishystuffResolveFishItemIconUrl = function (itemId) {
        var path = fishItemIconPath(itemId);
        return path ? window.__fishystuffResolveCdnUrl(path) : '';
      };
      window.__fishystuffResolveFishEncyclopediaIconUrl = function (encyclopediaId) {
        var path = fishEncyclopediaIconPath(encyclopediaId);
        return path ? window.__fishystuffResolveCdnUrl(path) : '';
      };
      window.__fishystuffRuntimeConfig = Object.freeze(Object.assign({}, runtimeConfig, {
        siteBaseUrl: window.__fishystuffSiteBaseUrl,
        apiBaseUrl: window.__fishystuffApiBaseUrl,
        cdnBaseUrl: window.__fishystuffCdnBaseUrl,
      }));
    })();
  </script>

  <script src="$site.asset('js/theme.js').link()"></script>

  <!-- Tailwind + daisyUI (compiled) -->
  <link rel="stylesheet" href="$site.asset('css/site.css').link()">
  <!-- CSS -->
  <link rel="stylesheet" href="$site.asset('css/fonts.css').link()">
  <link rel="stylesheet" href="$site.asset('css/fira_code.css').link()">
  <link rel="stylesheet" href="$site.asset('css/style.css').link()">
  <link rel="stylesheet" href="$site.asset('css/highlight.css').link()">
  <super>
</head>
<body id="body" class="prose prose-lg lg:prose-xl max-w-none min-h-dvh bg-base-100 text-base-content">
<super>
</body>
</html>
