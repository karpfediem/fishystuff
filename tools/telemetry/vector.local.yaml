data_dir: "./data/vector/state"

api:
  enabled: true
  address: "127.0.0.1:8686"

sources:
  devenv_process_logs:
    type: file
    include:
      - "./data/vector/process/*.log"
    read_from: beginning
  telemetry_logs_ingress:
    type: http_server
    address: "127.0.0.1:4820"
    method: POST
    path: "/v1/logs"
    strict_path: true
    response_code: 200
    decoding:
      codec: otlp
      signal_types:
        - logs
  telemetry_otlp_ingress:
    type: http_server
    address: "127.0.0.1:${FISHYSTUFF_DEV_VECTOR_OTLP_PASSTHROUGH_HTTP_PORT:-4821}"
    method: POST
    path: "/v1"
    strict_path: false
    response_code: 200
    decoding:
      codec: otlp
      signal_types:
        - metrics
        - traces

transforms:
  telemetry_logs_only:
    type: filter
    inputs:
      - telemetry_logs_ingress
    condition:
      type: is_log
  telemetry_metrics_only:
    type: filter
    inputs:
      - telemetry_otlp_ingress
    condition:
      type: is_metric
  telemetry_traces_only:
    type: filter
    inputs:
      - telemetry_otlp_ingress
    condition:
      type: is_trace
  normalized_process_logs:
    type: remap
    inputs:
      - devenv_process_logs
    source: |
      .app = "fishystuff"
      .deployment_environment = "local"
      .observability_kind = "log"
      .log_schema = "fishystuff.local.v1"
      .raw_line = string!(.message)
      .process = "unknown"
      .level = "info"
      .correlation = {}
      .http = {}
      .browser = {}
      .host = "local"
      .service_state = "log"

      wrapped = parse_regex(.raw_line, r'^\[(?P<wrapped_timestamp>[^\]]+)\] \[(?P<process>[^\]]+)\] (?P<body>.*)$') ?? null
      if wrapped != null {
        .wrapped_timestamp = wrapped.wrapped_timestamp
        .process = wrapped.process
        .message = wrapped.body

        parsed_timestamp = parse_timestamp(wrapped.wrapped_timestamp, format: "%Y-%m-%dT%H:%M:%S%z") ?? null
        if parsed_timestamp != null {
          .timestamp = parsed_timestamp
        }
      } else {
        .message = .raw_line
      }

      .service = "fishystuff-" + .process
      if .process == "api" {
        .service = "fishystuff-api"
      }

      decoded = parse_json(.message) ?? null
      if is_object(decoded) {
        .parsed = decoded

        parsed_level = get(.parsed, ["level"]) ?? null
        if parsed_level != null {
          .level = downcase(string!(parsed_level))
        }

        parsed_message = get(.parsed, ["message"]) ?? null
        if parsed_message != null {
          .message = string!(parsed_message)
        }

        request_id = get(.parsed, ["request.id"]) ?? null
        if request_id != null && string!(request_id) != "" {
          .correlation.request_id = string!(request_id)
        }
        trace_id = get(.parsed, ["trace.id"]) ?? null
        if trace_id != null && string!(trace_id) != "" {
          .correlation.trace_id = string!(trace_id)
        }
        span_id = get(.parsed, ["span.id"]) ?? null
        if span_id != null && string!(span_id) != "" {
          .correlation.span_id = string!(span_id)
        }

        http_method = get(.parsed, ["http.request.method"]) ?? null
        if http_method != null && string!(http_method) != "" {
          .http.method = string!(http_method)
        }
        http_route = get(.parsed, ["http.route"]) ?? null
        if http_route != null && string!(http_route) != "" {
          .http.route = string!(http_route)
        }
        http_status_code = get(.parsed, ["http.response.status_code"]) ?? null
        if http_status_code != null {
          .http.status_code = http_status_code
        }
      }

      if !exists(.message) || is_null(.message) {
        .message = .raw_line
      } else {
        .message = string!(.message)
      }

      if exists(.correlation.request_id) {
        .request_id = .correlation.request_id
      }
      if exists(.correlation.trace_id) {
        .trace_id = .correlation.trace_id
      }
      if exists(.correlation.span_id) {
        .span_id = .correlation.span_id
      }

  normalized_telemetry_logs:
    type: remap
    inputs:
      - telemetry_logs_only
    source: |
      .app = "fishystuff"
      .deployment_environment = "local"
      .observability_kind = "log"
      .log_schema = "fishystuff.browser-otel.v1"
      .process = "browser"
      .correlation = {}
      .http = {}
      .browser = {}
      .host = "browser"
      .service_state = "log"
      first_resource_log = get(., ["resourceLogs", 0]) ?? {}
      first_scope_log = get(first_resource_log, ["scopeLogs", 0]) ?? {}
      first_log_record = get(first_scope_log, ["logRecords", 0]) ?? {}

      event_timestamp = null
      if exists(.timestamp) && !is_null(.timestamp) {
        event_timestamp = parse_timestamp(string!(.timestamp), format: "%+") ?? null
      }
      if event_timestamp == null && exists(.observed_timestamp) && !is_null(.observed_timestamp) {
        event_timestamp = parse_timestamp(string!(.observed_timestamp), format: "%+") ?? null
      }
      if event_timestamp != null {
        .timestamp = event_timestamp
      }

      .service = "fishystuff-site-local"
      service_name = get(.resources, ["service.name"]) ?? null
      if service_name != null && string!(service_name) != "" {
        .service = string!(service_name)
      }

      deployment_environment = get(.resources, ["deployment.environment"]) ?? null
      if deployment_environment != null && string!(deployment_environment) != "" {
        .deployment_environment = string!(deployment_environment)
      }

      severity_text = get(., ["severity_text"]) ?? null
      if severity_text == null {
        severity_text = get(first_log_record, ["severityText"]) ?? null
      }
      if severity_text != null && string!(severity_text) != "" {
        .level = downcase(string!(severity_text))
      } else {
        .level = "info"
      }

      logger_name = get(.scope, ["name"]) ?? null
      if logger_name == null {
        logger_name = get(first_scope_log, ["scope", "name"]) ?? null
      }
      if logger_name != null && string!(logger_name) != "" {
        .logger = string!(logger_name)
      }

      message_value = get(., ["message"]) ?? null
      if message_value == null {
        message_value = get(first_log_record, ["body", "stringValue"]) ?? null
      }
      if message_value == null || string!(message_value) == "" {
        .message = "browser log"
      } else {
        .message = string!(message_value)
      }

      request_id = get(.attributes, ["request.id"]) ?? null
      if request_id != null && string!(request_id) != "" {
        .correlation.request_id = string!(request_id)
        .request_id = .correlation.request_id
      }

      trace_id = get(.attributes, ["trace.id"]) ?? null
      if trace_id != null && string!(trace_id) != "" {
        .correlation.trace_id = string!(trace_id)
        .trace_id = .correlation.trace_id
      }

      span_id = get(.attributes, ["span.id"]) ?? null
      if span_id != null && string!(span_id) != "" {
        .correlation.span_id = string!(span_id)
        .span_id = .correlation.span_id
      }

      http_status_code = get(.attributes, ["http.response.status_code"]) ?? null
      if http_status_code != null {
        .http.status_code = http_status_code
      }

      url_full = get(.attributes, ["url.full"]) ?? null
      if url_full != null && string!(url_full) != "" {
        .browser.url_full = string!(url_full)
      }

      url_path = get(.attributes, ["url.path"]) ?? null
      if url_path != null && string!(url_path) != "" {
        .browser.url_path = string!(url_path)
      }

      url_query = get(.attributes, ["url.query"]) ?? null
      if url_query != null && string!(url_query) != "" {
        .browser.url_query = string!(url_query)
      }

      log_source = get(.attributes, ["fishystuff.log.source"]) ?? null
      if log_source != null && string!(log_source) != "" {
        .browser.source = string!(log_source)
      }

      error_type = get(.attributes, ["error.type"]) ?? null
      if error_type != null && string!(error_type) != "" {
        .browser.error_type = string!(error_type)
      }

      error_message = get(.attributes, ["error.message"]) ?? null
      if error_message != null && string!(error_message) != "" {
        .browser.error_message = string!(error_message)
      }

      error_stack = get(.attributes, ["error.stack"]) ?? null
      if error_stack != null && string!(error_stack) != "" {
        .browser.error_stack = string!(error_stack)
      }

      if !exists(.browser.source) {
        .browser.source = "browser"
      }

sinks:
  logs_archive:
    type: file
    inputs:
      - normalized_process_logs
    path: "./data/vector/archive/logs/%Y-%m-%d.ndjson"
    encoding:
      codec: json

  logs_loki:
    type: loki
    inputs:
      - normalized_process_logs
      - normalized_telemetry_logs
    endpoint: "http://127.0.0.1:3100"
    encoding:
      codec: json
    labels:
      app: "{{ app }}"
      env: "{{ deployment_environment }}"
      host: "{{ host }}"
      process: "{{ process }}"
      service: "{{ service }}"
      service_state: "{{ service_state }}"
      level: "{{ level }}"
    structured_metadata:
      log_schema: "{{ log_schema }}"
      '"correlation_*"': "{{ correlation }}"
      '"http_*"': "{{ http }}"
      '"browser_*"': "{{ browser }}"
    healthcheck:
      enabled: false

  traces_archive:
    type: file
    inputs:
      - telemetry_traces_only
    path: "./data/vector/archive/traces/%Y-%m-%d.ndjson"
    encoding:
      codec: json

  telemetry_ingress_traces_to_collector:
    type: opentelemetry
    inputs:
      - telemetry_traces_only
    protocol:
      type: http
      uri: "http://127.0.0.1:${FISHYSTUFF_DEV_OTEL_COLLECTOR_HTTP_PORT:-4818}/v1/traces"
      encoding:
        codec: otlp
    healthcheck:
      enabled: false

  telemetry_ingress_metrics_to_collector:
    type: opentelemetry
    inputs:
      - telemetry_metrics_only
    protocol:
      type: http
      uri: "http://127.0.0.1:${FISHYSTUFF_DEV_OTEL_COLLECTOR_HTTP_PORT:-4818}/v1/metrics"
      encoding:
        codec: otlp
    healthcheck:
      enabled: false

  telemetry_ingress_logs_archive:
    type: file
    inputs:
      - telemetry_logs_only
    path: "./data/vector/archive/otel-logs/%Y-%m-%d.ndjson"
    encoding:
      codec: json
