receivers:
  otlp:
    protocols:
      http:
        endpoint: 127.0.0.1:4818

processors:
  batch:
    timeout: 250ms
    send_batch_size: 32

exporters:
  otlp/jaeger:
    endpoint: 127.0.0.1:4317
    tls:
      insecure: true

extensions:
  health_check:
    endpoint: 127.0.0.1:13133

service:
  extensions: [health_check]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/jaeger]
