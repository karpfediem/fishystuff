receivers:
  otlp:
    protocols:
      http:
        endpoint: "127.0.0.1:${env:FISHYSTUFF_DEV_OTEL_COLLECTOR_HTTP_PORT:-4818}"

processors:
  batch:
    timeout: 250ms
    send_batch_size: 32

connectors:
  spanmetrics:
    histogram:
      unit: ms
    dimensions:
      - name: deployment.environment
        default: local
    metrics_flush_interval: 10s

exporters:
  otlp/jaeger:
    endpoint: "127.0.0.1:${env:FISHYSTUFF_DEV_JAEGER_OTLP_GRPC_PORT:-4317}"
    tls:
      insecure: true
  prometheus:
    endpoint: "127.0.0.1:${env:FISHYSTUFF_DEV_OTEL_SPANMETRICS_PORT:-8889}"

extensions:
  health_check:
    endpoint: "127.0.0.1:${env:FISHYSTUFF_DEV_OTEL_COLLECTOR_HEALTH_PORT:-13133}"

service:
  extensions: [health_check]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/jaeger, spanmetrics]
    metrics:
      receivers: [otlp, spanmetrics]
      processors: [batch]
      exporters: [prometheus]
  telemetry:
    metrics:
      level: none
