receivers:
  otlp:
    protocols:
      http:
        endpoint: "127.0.0.1:${env:FISHYSTUFF_DEV_OTEL_COLLECTOR_HTTP_PORT:-4818}"
        cors:
          allowed_origins:
            - http://127.0.0.1:1990
            - http://localhost:1990

processors:
  batch:
    timeout: 250ms
    send_batch_size: 32

connectors:
  spanmetrics:
    histogram:
      unit: ms
    metrics_flush_interval: 10s

exporters:
  otlp/jaeger:
    endpoint: "127.0.0.1:${env:FISHYSTUFF_DEV_JAEGER_OTLP_GRPC_PORT:-4317}"
    tls:
      insecure: true
  otlphttp/vector:
    endpoint: "http://127.0.0.1:${env:FISHYSTUFF_DEV_VECTOR_OTLP_HTTP_PORT:-4820}"
  prometheus:
    endpoint: "127.0.0.1:${env:FISHYSTUFF_DEV_OTEL_SPANMETRICS_PORT:-8889}"

extensions:
  health_check:
    endpoint: "127.0.0.1:${env:FISHYSTUFF_DEV_OTEL_COLLECTOR_HEALTH_PORT:-13133}"

service:
  extensions: [health_check]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/jaeger, otlphttp/vector, spanmetrics]
    metrics/spanmetrics:
      receivers: [spanmetrics]
      exporters: [prometheus]
  telemetry:
    metrics:
      level: none
