service:
  extensions: [jaeger_storage, jaeger_query, healthcheckv2]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [jaeger_storage_exporter]
  telemetry:
    resource:
      service.name: jaeger
    metrics:
      level: detailed
      readers:
        - pull:
            exporter:
              prometheus:
                host: 127.0.0.1
                port: ${env:FISHYSTUFF_DEV_JAEGER_METRICS_PORT:-8888}
    logs:
      level: info

extensions:
  jaeger_query:
    storage:
      traces: local_trace_storage
      metrics: local_metrics_storage
    ui:
      config_file: ./tools/telemetry/jaeger-ui.local.json
    grpc:
      endpoint: "127.0.0.1:${env:FISHYSTUFF_DEV_JAEGER_QUERY_GRPC_PORT:-16685}"
    http:
      endpoint: "127.0.0.1:${env:FISHYSTUFF_DEV_JAEGER_UI_PORT:-16686}"

  jaeger_storage:
    backends:
      local_trace_storage:
        memory:
          max_traces: 100000
    metric_backends:
      local_metrics_storage:
        prometheus:
          endpoint: "http://127.0.0.1:${env:FISHYSTUFF_DEV_PROMETHEUS_PORT:-9090}"
          normalize_calls: true
          normalize_duration: true

  healthcheckv2:
    use_v2: true
    http:
      endpoint: "127.0.0.1:${env:FISHYSTUFF_DEV_JAEGER_HEALTH_PORT:-14269}"

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: "127.0.0.1:${env:FISHYSTUFF_DEV_JAEGER_OTLP_GRPC_PORT:-4317}"
      http:
        endpoint: "127.0.0.1:${env:FISHYSTUFF_DEV_JAEGER_OTLP_HTTP_PORT:-4318}"

processors:
  batch:
    timeout: 250ms
    send_batch_size: 32

exporters:
  jaeger_storage_exporter:
    trace_storage: local_trace_storage
