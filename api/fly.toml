# Fly app name must be globally unique and cannot contain dots.
app = "api-fishystuff-fish"
primary_region = "fra"
kill_signal = "SIGINT"
kill_timeout = "30s"

[deploy]
  strategy = "immediate"

[build]
  image = "registry.fly.io/api-fishystuff-fish:latest"

[env]
  DOLT_API_SQL_USER = "fishystuff_api"
  DOLT_DATA_ROOT = "/data"
  DOLT_DATABASE_NAME = "fishystuff"
  DOLT_REMOTE_BRANCH = "main"
  DOLT_SQL_HOST = "127.0.0.1"
  DOLT_SQL_PORT = "3306"
  DOLT_SQL_READ_ONLY = "true"
  FISHYSTUFF_BIND = "0.0.0.0:8080"
  RUST_LOG = "info"
  # Set DOLT_REMOTE_URL before deploy. For a public DoltHub repo this can be a
  # regular Fly env var, but using a secret keeps the deploy path consistent:
  # fly secrets set DOLT_REMOTE_URL='fishystuff/fishystuff'
  # Override DOLT_REMOTE_BRANCH per deployment if needed.

[http_service]
  internal_port = 8080
  force_https = true
  auto_start_machines = true
  auto_stop_machines = "off"
  min_machines_running = 1

  [[http_service.checks]]
    method = "GET"
    path = "/healthz"
    interval = "15s"
    timeout = "5s"
    grace_period = "120s"

[[mounts]]
  source = "fishystuff_data"
  destination = "/data"
  initial_size = "3gb"

[[vm]]
  cpu_kind = "shared"
  cpus = 2
  memory_mb = 2048
