# fishystuff API sample config

[paths]
terrain_manifest_url = "/images/terrain/v1/manifest.json"
terrain_drape_manifest_url = "/images/terrain_drape/minimap/v1/manifest.json"
# Canonical packed RGB24 height tiles derived directly from whole_fullres.png.
terrain_height_tiles_url = "/images/terrain_height/v1"

[dolt_sql]
# url = "mysql://root@127.0.0.1:3306/fishystuff"
# host = "127.0.0.1"
# port = 3306
# user = "root"
# password = ""
# database = "fishystuff"

[defaults]
map_version = "v1"
tile_px = 32
sigma_tiles = 3.0
half_life_days = 30.0
alpha0 = 1.0
top_k = 30

[server]
cors_allowed_origins = "https://fishystuff.fish,https://www.fishystuff.fish"

[thresholds]
stale_days = 30.0
ess = 10.0
drift_jsd = 0.1
drift_prob = 0.95
drift_samples = 300
drift_min_ess = 10.0

[server.cache]
zone_stats_max_entries = 256
effort_grid_max_entries = 16
log = false
