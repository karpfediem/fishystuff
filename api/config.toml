# fishystuff API sample config

[dolt_sql]
# url = "mysql://root@127.0.0.1:3306/fishystuff"
# host = "127.0.0.1"
# port = 3306
# user = "root"
# password = ""
# database = "fishystuff"

[defaults]
map_version = "v1"
tile_px = 32
sigma_tiles = 3.0
half_life_days = 30.0
alpha0 = 1.0
top_k = 30

[zone_masks]
root = "data/cdn/public/images"

[server]
cors_allowed_origins = "https://fishystuff.fish"

[thresholds]
stale_days = 30.0
ess = 10.0
drift_jsd = 0.1
drift_prob = 0.95
drift_samples = 300
drift_min_ess = 10.0

[server.cache]
zone_stats_max_entries = 256
effort_grid_max_entries = 16
log = false
