name: github pages

on:
  push:
    tags:
      - "*"  # Deploy production site only from tagged commits.
jobs:
  deploy:
    if: startsWith(github.ref, 'refs/tags/')
    environment:
      name: github-pages
    permissions:
      contents: read
      id-token: write
      pages: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Change if you need git info
      - uses: cachix/install-nix-action@v31
      - name: Install site build tooling
        shell: bash
        run: nix profile add nixpkgs#bun nixpkgs#imagemagick nixpkgs#python3Packages.fonttools nixpkgs#woff2
      - name: Setup Zine
        uses: kristoff-it/setup-zine@v1
        with:
          version: v0.11.2
      - name: Build site
        shell: bash
        run: |
          cd site
          bun install --frozen-lockfile
          bun run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'site/public'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
